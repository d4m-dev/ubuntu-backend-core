<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Của Tôi | D4M Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; font-family: sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-glass { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); color: white; transition: all 0.3s; }
        .input-glass:focus { background: rgba(15, 23, 42, 0.5); border-color: rgba(59, 130, 246, 0.5); outline: none; }
        .toast-enter { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gradient-to-br from-[#0b0f19] via-slate-900 to-[#0b0f19] min-h-screen text-white pb-10">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3"></div>

    <!-- Header điều hướng -->
    <header class="py-6 px-8 max-w-4xl mx-auto flex justify-between items-center">
        <a href="/hub.html" class="text-gray-400 hover:text-white transition flex items-center group">
            <i class="fa-solid fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> Trở về Hub
        </a>
        <div class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 tracking-wide text-xl">D4M ID</div>
    </header>

    <main class="max-w-4xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- CỘT TRÁI: AVATAR & MENU -->
        <div class="space-y-6">
            <div class="glass-panel p-6 rounded-3xl text-center shadow-xl">
                <div class="relative inline-block group cursor-pointer" onclick="document.getElementById('avatarUpload').click()">
                    <img id="profileAvatar" src="/src/favicon/ubuntu-backend/favicon-96x96.png" class="w-32 h-32 rounded-full mx-auto object-cover border-4 border-blue-500/30 shadow-[0_0_20px_rgba(59,130,246,0.3)] transition-all group-hover:brightness-50">
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fa-solid fa-camera text-2xl text-white"></i>
                    </div>
                    <!-- Nút upload ẩn -->
                    <input type="file" id="avatarUpload" class="hidden" accept="image/*" onchange="handleAvatarUpload(event)">
                </div>
                <h3 id="displayFullName" class="text-xl font-black mt-4 text-white">Người dùng</h3>
                <p id="displayUsername" class="text-sm text-gray-400 font-mono">@username</p>
                <div class="mt-4 inline-flex items-center bg-green-500/10 text-green-400 border border-green-500/20 px-3 py-1 rounded-full text-xs font-bold">
                    <i class="fa-solid fa-shield-check mr-1.5"></i> Đã định danh
                </div>
            </div>
            
            <div class="glass-panel p-2 rounded-3xl flex flex-col space-y-1">
                <button onclick="switchTab('basic')" id="tabBasic" class="text-left px-5 py-3 rounded-2xl bg-blue-500/20 text-blue-400 font-bold transition">
                    <i class="fa-solid fa-user-pen w-6"></i> Hồ sơ cá nhân
                </button>
                <button onclick="switchTab('email')" id="tabEmail" class="text-left px-5 py-3 rounded-2xl hover:bg-white/5 text-gray-400 font-bold transition">
                    <i class="fa-solid fa-envelope w-6"></i> Đổi Email
                </button>
            </div>
        </div>

        <!-- CỘT PHẢI: FORMS -->
        <div class="md:col-span-2">
            
            <!-- FORM 1: THÔNG TIN CƠ BẢN -->
            <div id="viewBasic" class="glass-panel p-8 rounded-3xl shadow-xl">
                <h2 class="text-2xl font-bold mb-6 border-b border-white/10 pb-4">Thông Tin Cơ Bản</h2>
                <form onsubmit="handleUpdateProfile(event)" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-xs text-gray-400 font-bold uppercase mb-2">Họ và Tên</label>
                            <input type="text" id="inpFullName" class="w-full px-4 py-3 input-glass rounded-xl" placeholder="Ví dụ: Lý Thừa Ân">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 font-bold uppercase mb-2">Số Điện Thoại</label>
                            <input type="text" id="inpPhone" class="w-full px-4 py-3 input-glass rounded-xl" placeholder="09xxxxxxx">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 font-bold uppercase mb-2">Ngày Sinh</label>
                            <input type="date" id="inpDob" class="w-full px-4 py-3 input-glass rounded-xl">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 font-bold uppercase mb-2">Email Hiện Tại (Chỉ xem)</label>
                            <input type="email" id="inpEmail" disabled class="w-full px-4 py-3 bg-white/5 border border-white/5 rounded-xl text-gray-500 cursor-not-allowed">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-bold uppercase mb-2">Địa Chỉ Thường Trú</label>
                        <input type="text" id="inpAddress" class="w-full px-4 py-3 input-glass rounded-xl" placeholder="Nhập địa chỉ của bạn...">
                    </div>
                    
                    <div class="pt-4 text-right">
                        <button type="submit" id="btnSaveBasic" class="px-8 py-3 bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl font-bold hover:from-blue-500 hover:to-purple-500 transition shadow-lg active:scale-95">
                            Lưu Thay Đổi
                        </button>
                    </div>
                </form>
            </div>

            <!-- FORM 2: ĐỔI EMAIL -->
            <div id="viewEmail" class="glass-panel p-8 rounded-3xl shadow-xl hidden">
                <h2 class="text-2xl font-bold mb-6 border-b border-white/10 pb-4">Đổi Địa Chỉ Email</h2>
                
                <div id="stepRequestEmail">
                    <p class="text-sm text-gray-400 mb-5">Hệ thống sẽ gửi một mã OTP gồm 6 số vào Email mới để xác nhận quyền sở hữu của sếp.</p>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-gray-400 font-bold uppercase mb-2">Địa chỉ Email mới</label>
                            <input type="email" id="inpNewEmail" class="w-full px-4 py-3 input-glass rounded-xl" placeholder="new.email@example.com">
                        </div>
                        <button onclick="requestEmailOTP()" id="btnRequestOTP" class="w-full py-3 bg-white/10 hover:bg-white/20 border border-white/10 rounded-xl font-bold transition shadow-lg active:scale-95">
                            Gửi mã OTP
                        </button>
                    </div>
                </div>

                <div id="stepVerifyEmail" class="hidden space-y-4">
                    <div class="bg-blue-500/10 border border-blue-500/20 p-4 rounded-xl text-center mb-2">
                        <p class="text-sm text-blue-200">Đã gửi mã OTP đến <span id="lblSentEmail" class="font-bold text-white"></span></p>
                    </div>
                    <input type="text" id="inpEmailOTP" placeholder="NHẬP 6 SỐ OTP" class="w-full px-4 py-4 input-glass rounded-xl text-center text-2xl tracking-[0.5em] font-mono uppercase">
                    <button onclick="verifyEmailOTP()" id="btnVerifyOTP" class="w-full py-3 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 rounded-xl font-bold transition shadow-lg active:scale-95">
                        Xác Nhận & Đổi Email
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script>
        const token = localStorage.getItem('d4m_sso_token');
        if(!token) {
            window.location.href = '/auth.html?redirect=/profile.html';
        }

        const headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icon = type === 'success' ? '<i class="fa-solid fa-circle-check text-green-400"></i>' : '<i class="fa-solid fa-triangle-exclamation text-red-400"></i>';
            const border = type === 'success' ? 'border-green-500/30 bg-green-500/10' : 'border-red-500/30 bg-red-500/10';
            toast.className = `flex items-center gap-3 px-5 py-3.5 rounded-xl border ${border} backdrop-blur-md shadow-xl toast-enter min-w-[250px]`;
            toast.innerHTML = `${icon} <span class="text-white text-sm font-medium">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity='0'; setTimeout(()=>toast.remove(),300); }, 3000);
        }

        function switchTab(tab) {
            document.getElementById('viewBasic').classList.add('hidden');
            document.getElementById('viewEmail').classList.add('hidden');
            document.getElementById('tabBasic').className = 'text-left px-5 py-3 rounded-2xl hover:bg-white/5 text-gray-400 font-bold transition';
            document.getElementById('tabEmail').className = 'text-left px-5 py-3 rounded-2xl hover:bg-white/5 text-gray-400 font-bold transition';
            
            if(tab === 'basic') {
                document.getElementById('viewBasic').classList.remove('hidden');
                document.getElementById('tabBasic').className = 'text-left px-5 py-3 rounded-2xl bg-blue-500/20 text-blue-400 font-bold transition';
            } else {
                document.getElementById('viewEmail').classList.remove('hidden');
                document.getElementById('tabEmail').className = 'text-left px-5 py-3 rounded-2xl bg-blue-500/20 text-blue-400 font-bold transition';
            }
        }

        // ================= KHỞI TẠO DỮ LIỆU =================
        async function loadProfile() {
            try {
                const res = await fetch('/api/auth/profile/me', { headers: { 'Authorization': `Bearer ${token}` }});
                if(!res.ok) throw new Error();
                const data = (await res.json()).data;
                
                document.getElementById('profileAvatar').src = data.avatar_url;
                document.getElementById('displayFullName').innerText = data.full_name || data.username;
                document.getElementById('displayUsername').innerText = "@" + data.username;
                
                document.getElementById('inpFullName').value = data.full_name || "";
                document.getElementById('inpPhone').value = data.phone || "";
                document.getElementById('inpDob').value = data.dob || "";
                document.getElementById('inpAddress').value = data.address || "";
                document.getElementById('inpEmail').value = data.email || "";
            } catch(e) {
                showToast("Phiên đăng nhập hết hạn!", "error");
                setTimeout(()=> { localStorage.removeItem('d4m_sso_token'); window.location.href='/auth.html'; }, 1500);
            }
        }
        document.addEventListener('DOMContentLoaded', loadProfile);

        // ================= CẬP NHẬT PROFILE =================
        async function handleUpdateProfile(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSaveBasic');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang lưu...';
            
            const payload = {
                full_name: document.getElementById('inpFullName').value,
                phone: document.getElementById('inpPhone').value,
                dob: document.getElementById('inpDob').value || null,
                address: document.getElementById('inpAddress').value
            };

            try {
                const res = await fetch('/api/auth/profile/update', { method: 'PUT', headers, body: JSON.stringify(payload) });
                if(res.ok) {
                    showToast("Cập nhật hồ sơ thành công!");
                    document.getElementById('displayFullName').innerText = payload.full_name;
                } else showToast("Có lỗi xảy ra", "error");
            } catch(e) { showToast("Lỗi máy chủ", "error"); }
            btn.innerHTML = 'Lưu Thay Đổi';
        }

        // ================= ĐỔI AVATAR (AJAX UPLOAD) =================
        async function handleAvatarUpload(e) {
            const file = e.target.files[0];
            if(!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                showToast("Đang tải ảnh lên...", "success");
                const res = await fetch('/api/auth/profile/avatar', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }, // FormData không cần Content-Type
                    body: formData
                });
                const data = await res.json();
                if(res.ok) {
                    showToast("Cập nhật ảnh đại diện thành công!");
                    document.getElementById('profileAvatar').src = data.avatar_url + "?t=" + new Date().getTime(); // Ép F5 Cache
                } else showToast(data.detail, "error");
            } catch(e) { showToast("Lỗi máy chủ khi tải ảnh", "error"); }
        }

        // ================= ĐỔI EMAIL =================
        let tempNewEmail = "";
        async function requestEmailOTP() {
            const email = document.getElementById('inpNewEmail').value;
            if(!email) { showToast("Vui lòng nhập Email mới", "error"); return; }
            
            const btn = document.getElementById('btnRequestOTP');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang gửi...';
            
            try {
                const res = await fetch('/api/auth/profile/change-email/request', { method: 'POST', headers, body: JSON.stringify({new_email: email}) });
                const data = await res.json();
                if(res.ok) {
                    tempNewEmail = email;
                    document.getElementById('stepRequestEmail').classList.add('hidden');
                    document.getElementById('stepVerifyEmail').classList.remove('hidden');
                    document.getElementById('lblSentEmail').innerText = email;
                    showToast("Đã gửi OTP đến Email mới!");
                } else showToast(data.detail, "error");
            } catch(e) { showToast("Lỗi kết nối", "error"); }
            btn.innerHTML = 'Gửi mã OTP';
        }

        async function verifyEmailOTP() {
            const otp = document.getElementById('inpEmailOTP').value;
            if(otp.length < 6) return;

            const btn = document.getElementById('btnVerifyOTP');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Xác thực...';

            try {
                const res = await fetch('/api/auth/profile/change-email/verify', { method: 'POST', headers, body: JSON.stringify({new_email: tempNewEmail, otp: otp}) });
                if(res.ok) {
                    showToast("Đổi Email thành công rực rỡ!");
                    document.getElementById('inpEmail').value = tempNewEmail;
                    document.getElementById('stepVerifyEmail').classList.add('hidden');
                    document.getElementById('stepRequestEmail').classList.remove('hidden');
                    document.getElementById('inpNewEmail').value = '';
                } else showToast("Mã OTP không đúng", "error");
            } catch(e) { showToast("Lỗi kết nối", "error"); }
            btn.innerHTML = 'Xác Nhận & Đổi Email';
        }
    </script>
</body>
</html>
