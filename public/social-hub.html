<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Hub | d4m-dev Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { background: radial-gradient(circle at 50% 0%, #1a103c, #0b071e); color: white; min-height: 100vh; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; } ::-webkit-scrollbar-thumb:hover { background: #e94560; }
        .post-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: transform 0.2s, box-shadow 0.2s; }
        .post-card:hover { border-color: rgba(233, 69, 96, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        audio { width: 100%; height: 40px; outline: none; border-radius: 999px; } audio::-webkit-media-controls-panel { background-color: rgba(255, 255, 255, 0.1); color: white; } audio::-webkit-media-controls-current-time-display, audio::-webkit-media-controls-time-remaining-display { color: #fff; }
        .delete-btn { opacity: 0.5; transition: all 0.2s; } .post-card:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body class="w-full flex justify-center p-2 md:p-6">

    <div id="loginModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center hidden">
        <div class="bg-[#1a103c] border border-[#e94560]/30 p-8 rounded-3xl max-w-sm w-full mx-4 shadow-2xl shadow-[#e94560]/20 text-center">
            <i class="fa-solid fa-bolt text-4xl text-[#e94560] mb-4"></i>
            <h2 class="text-xl font-black text-white mb-2 uppercase">Ghi Danh Trạm Phát</h2>
            <p class="text-sm text-gray-400 mb-6">Nhập tên của bạn để tham gia giao lưu mạng lưới!</p>
            <input type="text" id="guestName" placeholder="Tên hiển thị..." class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-[#e94560] outline-none mb-4 transition text-center" onkeypress="if(event.key === 'Enter') handleLogin()">
            <button onclick="handleLogin()" class="w-full py-3 bg-gradient-to-r from-[#e94560] to-[#ff7b54] rounded-xl font-bold uppercase tracking-widest hover:scale-105 transition">Vào Trong</button>
        </div>
    </div>

    <div class="w-full max-w-2xl flex flex-col gap-6 relative">
        
        <div class="flex items-center justify-between py-4 px-2 border-b border-white/10 sticky top-0 bg-[#0b071e]/80 backdrop-blur-xl z-50">
            <h1 class="text-xl font-black tracking-widest uppercase bg-gradient-to-r from-[#e94560] to-[#ff7b54] bg-clip-text text-transparent">
                <i class="fa-solid fa-bolt mr-2"></i>Social Hub
            </h1>
            <div class="flex items-center gap-3">
                <div id="authControls"></div>
                <span id="currentUserName" class="text-xs font-bold text-gray-400">Khách</span>
                <img id="currentUserAvatar" src="https://via.placeholder.com/150" class="w-8 h-8 rounded-full border border-white/20 bg-black/50">
            </div>
        </div>

        <div id="postArea" class="post-card rounded-3xl p-5 shadow-lg relative z-40 hidden">
            <div class="flex gap-4">
                <img id="postAvatar" src="https://via.placeholder.com/150" class="w-10 h-10 rounded-full flex-shrink-0 bg-black/50">
                <div class="flex-1">
                    <textarea id="postContent" rows="3" class="w-full bg-transparent text-white placeholder-gray-500 text-sm resize-none outline-none" placeholder="Đang nghe bài gì thế? Chia sẻ đi..."></textarea>
                    
                    <div id="mediaAttachmentBox" class="hidden mt-3 p-3 bg-black/40 rounded-xl border border-white/5 flex items-center justify-between">
                        <div class="flex items-center gap-3 truncate">
                            <i class="fa-solid fa-music text-[#ff7b54]"></i>
                            <span id="attachedMediaName" class="text-xs font-bold text-gray-300 truncate">Đã chọn bài hát...</span>
                        </div>
                        <button onclick="removeMedia()" class="text-gray-500 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
                    </div>

                    <div class="flex items-center justify-between mt-4 border-t border-white/10 pt-3 relative">
                        <div class="flex gap-2 relative">
                            <button onclick="toggleMusicDropdown()" class="w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-[#e94560] transition">
                                <i class="fa-solid fa-compact-disc"></i>
                            </button>
                            <div id="musicDropdown" class="hidden absolute top-10 left-0 w-64 max-h-48 overflow-y-auto bg-[#241a45] border border-[#e94560]/30 rounded-xl shadow-2xl z-50 p-2">
                                <div class="text-[10px] font-bold text-[#ff7b54] mb-2 px-2 uppercase tracking-wider">Kho nhạc Server</div>
                                <div id="musicListDropdown" class="flex flex-col gap-1"></div>
                            </div>
                        </div>
                        <button onclick="submitPost()" class="px-6 py-2 bg-gradient-to-r from-[#e94560] to-[#ff7b54] rounded-full text-xs font-black tracking-widest uppercase hover:scale-105 transition transform shadow-lg shadow-[#e94560]/30">
                            ĐĂNG BÀI
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="feedContainer" class="flex flex-col gap-5 pb-20 relative z-10"></div>
    </div>

    <script>
        let availableMedia = [];
        let selectedMediaData = null;
        let currentUser = JSON.parse(localStorage.getItem('d4m_social_user'));

        // ===================================
        // HỆ THỐNG ĐỊNH DANH (IDENTITY LOGIC)
        // ===================================
        function checkAuth() {
            if (!currentUser) {
                document.getElementById("loginModal").classList.remove("hidden");
                document.getElementById("postArea").classList.add("hidden");
                document.getElementById("authControls").innerHTML = '';
            } else {
                document.getElementById("loginModal").classList.add("hidden");
                document.getElementById("postArea").classList.remove("hidden");
                
                document.getElementById("currentUserName").innerText = currentUser.fullname;
                document.getElementById("currentUserAvatar").src = currentUser.avatar_url;
                document.getElementById("postAvatar").src = currentUser.avatar_url;
                
                document.getElementById("authControls").innerHTML = `<button onclick="logout()" class="text-xs text-red-400 hover:text-red-300 transition px-2" title="Đăng xuất"><i class="fa-solid fa-right-from-bracket"></i></button>`;
                loadFeed();
            }
        }

        async function handleLogin() {
            const nameInput = document.getElementById("guestName").value.trim();
            if(!nameInput) return;

            // 🚀 CỬA SAU CHO ADMIN: Nhập đúng "admin" sẽ có sức mạnh tối cao
            if(nameInput.toLowerCase() === "admin") {
                currentUser = { id: 1, username: "d4m_dev", fullname: "Lý Thừa Ân", avatar_url: "https://github.com/d4m-dev.png" };
                localStorage.setItem('d4m_social_user', JSON.stringify(currentUser));
                checkAuth();
                return;
            }

            // Tự động khai sinh tài khoản khách với Avatar xịn xò
            const username = "guest_" + new Date().getTime();
            const avatar = "https://api.dicebear.com/7.x/avataaars/svg?seed=" + encodeURIComponent(username);
            
            document.getElementById("guestName").disabled = true;
            try {
                const res = await fetch('/api/social/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, fullname: nameInput, avatar_url: avatar })
                });
                const data = await res.json();
                if(data.status === 'success') {
                    currentUser = { id: data.user_id, username: data.username, fullname: data.fullname, avatar_url: data.avatar_url };
                    localStorage.setItem('d4m_social_user', JSON.stringify(currentUser));
                    checkAuth();
                } else alert("Lỗi tạo thẻ: " + data.detail);
            } catch(e) { alert("Mất liên lạc vệ tinh!"); }
            document.getElementById("guestName").disabled = false;
        }

        function logout() {
            localStorage.removeItem('d4m_social_user');
            currentUser = null;
            checkAuth();
        }

        // ===================================
        // VẬN HÀNH BẢNG TIN VÀ MEDIA
        // ===================================
        async function initApp() {
            await loadMusicLibrary();
            checkAuth();
        }

        async function loadMusicLibrary() {
            try {
                const res = await fetch('/api/music/list');
                const data = await res.json();
                if(data.status === 'success') {
                    availableMedia = data.songs;
                    const dropdown = document.getElementById("musicListDropdown");
                    dropdown.innerHTML = "";
                    availableMedia.forEach(song => {
                        const btn = document.createElement("button");
                        btn.className = "text-left px-2 py-2 hover:bg-white/10 rounded-lg text-xs flex items-center gap-3 transition w-full";
                        btn.innerHTML = `<i class="fa-solid ${song.flags.video ? 'fa-video text-pink-400' : 'fa-music text-green-400'}"></i>
                            <div class="truncate"><div class="font-bold text-gray-200 truncate">${song.title}</div><div class="text-[9px] text-gray-500">${song.artist || 'Studio'}</div></div>`;
                        btn.onclick = () => {
                            selectedMediaData = song;
                            document.getElementById("attachedMediaName").innerText = song.title + (song.flags.video ? " (Video)" : " (Audio)");
                            document.getElementById("mediaAttachmentBox").classList.remove("hidden");
                            document.getElementById("musicDropdown").classList.add("hidden");
                        };
                        dropdown.appendChild(btn);
                    });
                }
            } catch (e) {}
        }

        function toggleMusicDropdown() { document.getElementById("musicDropdown").classList.toggle("hidden"); }
        function removeMedia() { selectedMediaData = null; document.getElementById("mediaAttachmentBox").classList.add("hidden"); }

        async function submitPost() {
            const content = document.getElementById("postContent").value.trim();
            if(!content && !selectedMediaData) return alert("Thêm chữ hoặc nhạc để đăng sếp ơi!");

            const payload = {
                user_id: currentUser.id, 
                content: content,
                attached_media: selectedMediaData ? selectedMediaData.id : null,
                media_type: selectedMediaData ? (selectedMediaData.flags.video ? "video" : "audio") : null
            };

            try {
                const res = await fetch('/api/social/posts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if((await res.json()).status === 'success') {
                    document.getElementById("postContent").value = "";
                    removeMedia(); loadFeed();
                }
            } catch (e) { alert("Lỗi kết nối"); }
        }

        async function deletePost(postId) {
            if(!confirm("Sếp có chắc chắn muốn cho bài này bay màu không?")) return;
            try {
                // Đẩy ID của người đang yêu cầu xóa lên server để xác thực quyền
                const res = await fetch(`/api/social/posts/${postId}?user_id=${currentUser.id}`, { method: 'DELETE' });
                const result = await res.json();
                if(result.status === 'success') loadFeed(); else alert(result.message);
            } catch (e) {}
        }

        async function loadFeed() {
            const container = document.getElementById("feedContainer");
            try {
                const res = await fetch('/api/social/feed');
                const result = await res.json();
                
                if(result.status === 'success') {
                    container.innerHTML = result.data.length === 0 ? "<div class='text-center text-gray-500 py-10'>Bảng tin trống rỗng. Mở bát đi sếp!</div>" : "";
                    
                    result.data.forEach(post => {
                        const date = new Date(post.created_at).toLocaleString('vi-VN', {hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'});
                        let mediaHtml = "";
                        
                        if(post.attached_media && post.stream_links) {
                            if(post.media_type === "video" && post.stream_links.video_url) {
                                mediaHtml = `<div class="mt-4 rounded-xl overflow-hidden border border-white/10 shadow-lg">
                                    <video controls class="w-full bg-black max-h-[400px]"><source src="${post.stream_links.video_url}" type="video/mp4"></video></div>`;
                            } else if (post.media_type === "audio" && post.stream_links.vocal_url) {
                                mediaHtml = `<div class="mt-4 p-3 bg-black/40 rounded-xl border border-white/5 flex gap-4 items-center">
                                    <img src="${post.stream_links.cover_url}" class="w-16 h-16 rounded-lg object-cover shadow-md" onerror="this.src='https://via.placeholder.com/100'">
                                    <div class="flex-1 w-full">
                                        <div class="text-xs font-bold text-gray-300 mb-2 truncate"><i class="fa-solid fa-play text-[#e94560] mr-2"></i>${post.attached_media}</div>
                                        <audio controls class="w-full h-8"><source src="${post.stream_links.vocal_url}" type="audio/mpeg"></audio>
                                    </div></div>`;
                            }
                        }

                        // 🚀 LOGIC HIỂN THỊ THÙNG RÁC: Chỉ hiện nếu bạn là Admin (id=1) HOẶC bài đó là của bạn
                        const deleteBtnHtml = (currentUser.id === 1 || post.user_id === currentUser.id) ? 
                            `<button onclick="deletePost(${post.post_id})" class="delete-btn text-gray-500 hover:text-red-500" title="Xóa rác"><i class="fa-solid fa-trash-can"></i></button>` : '';

                        const postEl = document.createElement("div");
                        postEl.className = "post-card rounded-3xl p-5";
                        postEl.innerHTML = `
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center gap-3">
                                    <img src="${post.avatar_url || 'https://via.placeholder.com/150'}" class="w-10 h-10 rounded-full border border-white/10" onerror="this.src='https://via.placeholder.com/150'">
                                    <div>
                                        <div class="text-sm font-bold text-gray-100 flex items-center gap-1">${post.fullname} ${post.user_id === 1 ? '<i class="fa-solid fa-circle-check text-blue-400 text-[10px]" title="Admin Verified"></i>' : ''}</div>
                                        <div class="text-[10px] text-gray-500">@${post.username} • ${date}</div>
                                    </div>
                                </div>
                                <div class="flex gap-3 items-center">${deleteBtnHtml}</div>
                            </div>
                            <div class="text-sm text-gray-200 leading-relaxed whitespace-pre-wrap">${post.content}</div>
                            ${mediaHtml}
                            <div class="flex items-center gap-6 mt-4 pt-3 border-t border-white/5 text-gray-500 text-sm">
                                <button class="hover:text-[#e94560] transition flex items-center gap-2"><i class="fa-regular fa-heart"></i></button>
                                <button class="hover:text-blue-400 transition flex items-center gap-2"><i class="fa-regular fa-comment"></i></button>
                            </div>
                        `;
                        container.appendChild(postEl);
                    });
                }
            } catch (e) {}
        }

        initApp();
    </script>
</body>
</html>
