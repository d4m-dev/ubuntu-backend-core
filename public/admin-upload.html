<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Upload Center | d4m-dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: white; min-height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem; }
        .tab-btn.active { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.5); color: #60a5fa; }
        .form-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 0.75rem 1rem; border-radius: 0.5rem; color: white; outline: none; transition: all 0.3s; }
        .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59,130,246,0.3); }
        .file-drop { border: 2px dashed rgba(255,255,255,0.2); padding: 1.5rem; text-align: center; border-radius: 0.5rem; cursor: pointer; transition: all 0.3s; }
        .file-drop:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="bg-gradient-to-br from-[#0b0f19] via-slate-900 to-[#0b0f19] p-4 md:p-8 font-sans antialiased">

    <div class="max-w-4xl mx-auto glass-panel p-6 shadow-2xl relative z-10">
        <header class="text-center mb-8 border-b border-white/10 pb-6">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                <i class="fa-solid fa-cloud-arrow-up mr-2 text-blue-400"></i>Trung Tâm Dữ Liệu
            </h1>
            <p class="text-gray-400 mt-2">Hệ thống upload và tự động định dạng tên file</p>
        </header>

        <div class="flex space-x-4 mb-6">
            <button onclick="switchTab('music')" id="tab-music" class="tab-btn active flex-1 py-3 rounded-lg border border-white/10 font-bold transition-all"><i class="fa-solid fa-music mr-2"></i>Upload Nhạc (Trọn Bộ)</button>
            <button onclick="switchTab('image')" id="tab-image" class="tab-btn flex-1 py-3 rounded-lg border border-white/10 font-bold transition-all"><i class="fa-solid fa-images mr-2"></i>Upload Ảnh (Hàng Loạt)</button>
        </div>

        <div id="status-msg" class="hidden p-4 rounded-lg mb-6 font-bold text-center"></div>

        <div id="form-music" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-blue-400 mb-2 uppercase tracking-wider">Tên bài hát (Định danh thư mục & file)</label>
                <input type="text" id="music-name" oninput="checkFolderExistence('music', this.value)" class="form-input" placeholder="VD: aihongnhan (Viết liền không dấu)" required>
                <p class="text-xs text-gray-500 mt-1">Hệ thống sẽ tự tạo thư mục audio_workspace/music/[tên] và đặt tên 5 file theo tên này.</p>
                
                <p id="music-warning" class="text-sm font-bold mt-2 hidden p-2 rounded-lg"></p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-black/20 p-4 rounded-lg border border-white/5 relative">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs font-bold text-gray-400">1. Nhạc Gốc (.mp3)</label>
                        <span id="st-audio" class="hidden transition-all duration-300"></span>
                    </div>
                    <input type="file" id="m-audio" accept=".mp3" class="w-full text-sm">
                </div>
                
                <div class="bg-black/20 p-4 rounded-lg border border-white/5 relative">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs font-bold text-gray-400">2. Nhạc Beat (.mp3)</label>
                        <span id="st-beat" class="hidden transition-all duration-300"></span>
                    </div>
                    <input type="file" id="m-beat" accept=".mp3" class="w-full text-sm">
                </div>

                <div class="bg-black/20 p-4 rounded-lg border border-white/5 relative">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs font-bold text-gray-400">3. Video (.mp4)</label>
                        <span id="st-video" class="hidden transition-all duration-300"></span>
                    </div>
                    <input type="file" id="m-video" accept=".mp4" class="w-full text-sm">
                </div>

                <div class="bg-black/20 p-4 rounded-lg border border-white/5 relative">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs font-bold text-gray-400">4. Ảnh Bìa (.jpg/.png)</label>
                        <span id="st-cover" class="hidden transition-all duration-300"></span>
                    </div>
                    <input type="file" id="m-cover" accept="image/*" class="w-full text-sm">
                </div>

                <div class="bg-black/20 p-4 rounded-lg border border-white/5 md:col-span-2 relative">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs font-bold text-gray-400">5. Lời Bài Hát (.lrc)</label>
                        <span id="st-lyric" class="hidden transition-all duration-300"></span>
                    </div>
                    <input type="file" id="m-lyric" accept=".lrc" class="w-full text-sm">
                </div>
            </div>

            <button onclick="uploadMusic()" class="w-full py-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded-lg font-bold shadow-lg transition-transform active:scale-[0.98]">
                <i class="fa-solid fa-rocket mr-2"></i>Tải Lên Trọn Bộ Nhạc
            </button>
        </div>

        <div id="form-image" class="space-y-6 hidden">
            <div>
                <label class="block text-sm font-bold text-blue-400 mb-2 uppercase tracking-wider">Tên thư mục ảnh</label>
                <input type="text" id="image-folder" oninput="checkFolderExistence('image', this.value)" class="form-input" placeholder="VD: album_mua_he" required>
                
                <p id="image-warning" class="text-sm font-bold mt-2 hidden p-2 rounded-lg"></p>
            </div>
            
            <div class="bg-black/20 p-4 rounded-lg border border-white/5">
                <label class="block text-xs font-bold text-gray-400 mb-2">Chọn các file ảnh (Có thể chọn nhiều file)</label>
                <input type="file" id="i-files" accept="image/*" multiple class="w-full text-sm file-drop">
            </div>

            <button onclick="uploadImages()" class="w-full py-4 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 rounded-lg font-bold shadow-lg transition-transform active:scale-[0.98]">
                <i class="fa-solid fa-cloud-arrow-up mr-2"></i>Tải Lên Thư Viện Ảnh
            </button>
        </div>
    </div>

    <script>
        // 1. 🔒 BẢO MẬT SSO
        const d4m_token = localStorage.getItem('d4m_sso_token');
        if (!d4m_token) {
            alert("🔒 Khu vực quản trị viên! Vui lòng đăng nhập hệ sinh thái D4M.");
            window.location.href = '/auth.html?redirect=/admin/upload';
        }

        // 2. Chuyển đổi Tab UI
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            if(tab === 'music') {
                document.getElementById('form-music').classList.remove('hidden');
                document.getElementById('form-image').classList.add('hidden');
            } else {
                document.getElementById('form-music').classList.add('hidden');
                document.getElementById('form-image').classList.remove('hidden');
            }
        }

        // 3. Hiển thị thông báo Toast
        function showStatus(msg, type = 'success') {
            const el = document.getElementById('status-msg');
            el.className = `p-4 rounded-lg mb-6 font-bold text-center ${type === 'success' ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-red-500/20 text-red-400 border border-red-500/30'}`;
            el.innerHTML = msg;
            el.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => el.classList.add('hidden'), 6000);
        }

        // 4. KIỂM TRA THƯ MỤC REALTIME & BÁO CHI TIẾT FILE
        let typingTimer;
        const doneTypingInterval = 500; 
        const fileBadges = ['st-audio', 'st-beat', 'st-video', 'st-cover', 'st-lyric'];

        function hideAllFileBadges() {
            fileBadges.forEach(id => document.getElementById(id).classList.add('hidden'));
        }

        async function checkFolderExistence(type, value) {
            clearTimeout(typingTimer);
            const warningEl = document.getElementById(`${type}-warning`);
            const name = value.trim();
            
            if (!name) {
                warningEl.classList.add('hidden');
                hideAllFileBadges(); 
                return;
            }

            // Trạng thái đang check
            warningEl.className = "text-sm font-bold mt-2 bg-blue-500/10 border border-blue-500/30 p-2 rounded-lg text-blue-400";
            warningEl.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Đang truy vấn dữ liệu...';
            warningEl.classList.remove('hidden');
            hideAllFileBadges(); 

            typingTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/admin/check-folder?folder_type=${type}&name=${name}`, {
                        headers: { 'Authorization': `Bearer ${d4m_token}` }
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        
                        if (data.exists) {
                            if(type === 'music') {
                                warningEl.className = "text-sm text-yellow-500 font-bold mt-2 bg-yellow-500/10 border border-yellow-500/30 p-2 rounded-lg shadow-lg";
                                warningEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1"></i> Thư mục đã tồn tại! Các file tải lên sẽ bị <span class="text-red-400 uppercase">Ghi đè</span>.';
                                
                                // Soi chi tiết từng file
                                if (data.files) {
                                    const mapId = { 'audio': 'st-audio', 'beat': 'st-beat', 'video': 'st-video', 'cover': 'st-cover', 'lyric': 'st-lyric' };
                                    for (const [key, exists] of Object.entries(data.files)) {
                                        const badge = document.getElementById(mapId[key]);
                                        badge.classList.remove('hidden');
                                        if (exists) {
                                            badge.className = "text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider bg-yellow-500/20 text-yellow-500 border border-yellow-500/30";
                                            badge.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Đã có trên máy chủ';
                                        } else {
                                            badge.className = "text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider bg-gray-600/30 text-gray-400 border border-gray-600/50";
                                            badge.innerHTML = '<i class="fa-solid fa-minus"></i> Chưa có';
                                        }
                                    }
                                }
                            } else {
                                warningEl.className = "text-sm text-blue-400 font-bold mt-2 bg-blue-500/10 border border-blue-500/30 p-2 rounded-lg shadow-lg";
                                warningEl.innerHTML = '<i class="fa-solid fa-circle-info mr-1"></i> THÔNG BÁO: Thư viện đã có! Ảnh mới sẽ được <span class="text-green-400 uppercase">Cộng dồn</span>.';
                            }
                        } else {
                            warningEl.className = "text-sm text-green-400 font-bold mt-2 bg-green-500/10 border border-green-500/30 p-2 rounded-lg";
                            warningEl.innerHTML = '<i class="fa-solid fa-check-circle mr-1"></i> Hợp lệ: Thư mục mới hoàn toàn!';
                            hideAllFileBadges(); 
                        }
                    } else {
                        warningEl.className = "text-sm text-red-400 font-bold mt-2 bg-red-500/10 border border-red-500/30 p-2 rounded-lg";
                        warningEl.innerHTML = '<i class="fa-solid fa-link-slash mr-1"></i> Lỗi API! Token hết hạn hoặc máy chủ từ chối.';
                    }
                } catch (e) {
                    warningEl.className = "text-sm text-red-400 font-bold mt-2 bg-red-500/10 border border-red-500/30 p-2 rounded-lg";
                    warningEl.innerHTML = '<i class="fa-solid fa-wifi mr-1"></i> Lỗi mất kết nối tới Backend.';
                }
            }, doneTypingInterval);
        }

        // 5. UPLOAD NHẠC
        async function uploadMusic() {
            const name = document.getElementById('music-name').value.trim();
            if(!name) return showStatus('Vui lòng nhập tên bài hát!', 'error');

            const formData = new FormData();
            formData.append('base_name', name);
            
            const files = {
                'audio': document.getElementById('m-audio').files[0],
                'beat': document.getElementById('m-beat').files[0],
                'video': document.getElementById('m-video').files[0],
                'cover': document.getElementById('m-cover').files[0],
                'lyric': document.getElementById('m-lyric').files[0]
            };

            const hasFiles = Object.values(files).some(file => file !== undefined);
            if (!hasFiles) return showStatus('Vui lòng chọn ít nhất 1 file để tải lên!', 'error');

            for (const [key, file] of Object.entries(files)) {
                if (file) formData.append(key, file);
            }

            try {
                const res = await fetch('/api/admin/upload-music', { 
                    method: 'POST', 
                    headers: { 'Authorization': `Bearer ${d4m_token}` },
                    body: formData 
                });
                
                const data = await res.json();
                if(res.ok) {
                    showStatus('<i class="fa-solid fa-check-circle mr-2"></i>' + data.message, 'success');
                    // Reset Form
                    document.querySelectorAll('#form-music input[type="file"]').forEach(input => input.value = '');
                    document.getElementById('music-name').value = '';
                    document.getElementById('music-warning').classList.add('hidden');
                    hideAllFileBadges();
                } else {
                    showStatus('<i class="fa-solid fa-triangle-exclamation mr-2"></i>' + (data.detail || "Upload thất bại"), 'error');
                }
            } catch (e) {
                showStatus('<i class="fa-solid fa-triangle-exclamation mr-2"></i>Lỗi kết nối máy chủ', 'error');
            }
        }

        // 6. UPLOAD ẢNH
        async function uploadImages() {
            const folder = document.getElementById('image-folder').value.trim();
            const files = document.getElementById('i-files').files;
            
            if(!folder) return showStatus('Vui lòng nhập tên thư mục!', 'error');
            if(files.length === 0) return showStatus('Vui lòng chọn ít nhất 1 ảnh!', 'error');

            const formData = new FormData();
            formData.append('folder_name', folder);
            for(let i = 0; i < files.length; i++) {
                formData.append('images', files[i]);
            }

            try {
                const res = await fetch('/api/admin/upload-images', { 
                    method: 'POST', 
                    headers: { 'Authorization': `Bearer ${d4m_token}` },
                    body: formData 
                });
                
                const data = await res.json();
                if(res.ok) {
                    showStatus('<i class="fa-solid fa-check-circle mr-2"></i>' + data.message, 'success');
                    document.getElementById('i-files').value = '';
                } else {
                    showStatus('<i class="fa-solid fa-triangle-exclamation mr-2"></i>' + (data.detail || "Upload thất bại"), 'error');
                }
            } catch (e) {
                showStatus('<i class="fa-solid fa-triangle-exclamation mr-2"></i>Lỗi kết nối máy chủ', 'error');
            }
        }
    </script>
</body>
</html>
