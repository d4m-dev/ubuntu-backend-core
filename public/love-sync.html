<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venus Compatibility | d4m-dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); color: white; min-height: 100vh; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.5); border-radius: 24px; padding: 40px; width: 100%; max-w: 600px; }
        .input-glass { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; padding: 12px; width: 100%; outline: none; transition: all 0.3s; }
        .input-glass:focus { border-color: #e94560; box-shadow: 0 0 15px rgba(233,69,96,0.3); }
        .heart-pulse { animation: heartbeat 1.5s infinite; filter: drop-shadow(0 0 15px #e94560); }
        @keyframes heartbeat { 0% { transform: scale(1); } 20% { transform: scale(1.2); } 40% { transform: scale(1); } 60% { transform: scale(1.1); } 80% { transform: scale(1); } }
        .result-text { background: -webkit-linear-gradient(#e94560, #ff7b54); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4">

    <div class="glass-panel w-full max-w-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black uppercase tracking-widest"><i class="fa-solid fa-star-and-crescent text-yellow-400 mr-2"></i>Venus Sync</h1>
            <p class="text-gray-400 text-sm mt-2">Nội suy Số Chủ Đạo & Năng lượng Chòm sao</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 relative">
            <div class="hidden md:flex absolute inset-y-0 left-1/2 transform -translate-x-1/2 items-center justify-center">
                <i class="fa-solid fa-heart text-2xl text-[#e94560] heart-pulse z-10"></i>
                <div class="absolute h-full w-[1px] bg-white/10"></div>
            </div>

            <div class="space-y-4">
                <h3 class="text-[#e94560] font-bold text-sm tracking-widest uppercase text-center border-b border-white/10 pb-2">Năng lượng A</h3>
                <div>
                    <label class="text-xs text-gray-400 uppercase">Họ và tên</label>
                    <input type="text" id="name1" class="input-glass mt-1" value="Lý Thừa Ân">
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase">Ngày sinh</label>
                    <input type="date" id="dob1" class="input-glass mt-1" value="2002-09-16">
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-blue-400 font-bold text-sm tracking-widest uppercase text-center border-b border-white/10 pb-2">Năng lượng B</h3>
                <div>
                    <label class="text-xs text-gray-400 uppercase">Họ và tên</label>
                    <input type="text" id="name2" class="input-glass mt-1" placeholder="Nhập tên đối phương">
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase">Ngày sinh</label>
                    <input type="date" id="dob2" class="input-glass mt-1">
                </div>
            </div>
        </div>

        <button onclick="calculateLove()" class="w-full mt-10 bg-gradient-to-r from-[#e94560] to-[#ff7b54] hover:opacity-90 text-white font-bold py-4 rounded-xl shadow-lg transition-transform hover:scale-[1.02] active:scale-95">
            GIẢI MÃ TƯƠNG HỢP
        </button>

        <div id="resultBox" class="mt-8 bg-black/40 border border-white/10 p-6 rounded-2xl text-center hidden transition-all">
            <h2 class="text-6xl font-black result-text" id="scoreDisplay">0%</h2>
            <div class="flex justify-center gap-4 mt-4 text-sm font-bold text-gray-300">
                <span class="bg-white/5 px-3 py-1 rounded-lg">A: Mệnh <span id="venus1Display" class="text-yellow-400">?</span></span>
                <span class="bg-white/5 px-3 py-1 rounded-lg">B: Mệnh <span id="venus2Display" class="text-yellow-400">?</span></span>
            </div>
            <p id="messageDisplay" class="mt-4 text-gray-400 text-sm italic leading-relaxed"></p>
        </div>
    </div>

    <script>
        async function calculateLove() {
            const data = {
                name_1: document.getElementById('name1').value,
                dob_1: document.getElementById('dob1').value,
                name_2: document.getElementById('name2').value,
                dob_2: document.getElementById('dob2').value
            };

            if(!data.dob_1 || !data.dob_2) {
                alert("Vui lòng chọn ngày sinh!"); return;
            }

            try {
                const res = await fetch('/api/astrology/match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if(result.status === 'success') {
                    document.getElementById('resultBox').classList.remove('hidden');
                    document.getElementById('scoreDisplay').innerText = result.score + '%';
                    document.getElementById('venus1Display').innerText = result.person_1.venus;
                    document.getElementById('venus2Display').innerText = result.person_2.venus;
                    document.getElementById('messageDisplay').innerText = result.message;
                }
            } catch (e) {
                console.error("Lỗi API:", e);
            }
        }
    </script>
</body>
</html>
