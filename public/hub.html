<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d4m-dev | Project Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); }
        .frozen-card { opacity: 0.6; filter: grayscale(80%); }
        .toast-enter { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gradient-to-br from-[#0b0f19] via-slate-900 to-[#0b0f19] min-h-screen text-white font-sans antialiased flex flex-col">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3"></div>

    <header class="py-12 text-center relative z-10 flex flex-col items-center">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-3">
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">Cloud Project Hub</span>
        </h1>
        <p class="text-gray-400 text-sm md:text-base font-mono tracking-wide mb-6">Mạng lưới ứng dụng Serverless cục bộ</p>
        
        <button id="btnHeaderAuth" onclick="redirectToAuth()" class="px-6 py-2.5 bg-white/5 hover:bg-white/10 text-white rounded-full backdrop-blur-md border border-white/10 transition shadow-lg flex items-center space-x-2 group">
            <div class="w-6 h-6 rounded-full bg-gradient-to-r from-blue-500 to-purple-500 flex items-center justify-center shadow-[0_0_10px_rgba(59,130,246,0.5)] group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-fingerprint text-xs text-white"></i>
            </div>
            <span class="font-bold tracking-wide">Đăng nhập D4M ID</span>
        </button>

        <div id="userProfileWidget" class="hidden flex items-center space-x-3 bg-white/5 border border-white/10 rounded-full pr-2 pl-1 py-1 backdrop-blur-md shadow-lg transition hover:bg-white/10">
            <a href="/profile.html" class="flex items-center space-x-3 pr-4 pl-1 py-1 rounded-full cursor-pointer group">
                <img id="headerAvatar" src="/src/favicon/ubuntu-backend/favicon-96x96.png" class="w-9 h-9 rounded-full border-2 border-blue-500/50 object-cover shadow-[0_0_10px_rgba(59,130,246,0.4)] group-hover:border-blue-400 transition-colors">
                <div class="text-left">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">Xin chào,</p>
                    <p id="headerUsername" class="font-bold text-sm text-white leading-none group-hover:text-blue-300 transition-colors">Loading...</p>
                </div>
            </a>
            <div class="w-px h-6 bg-white/10"></div>
            <button onclick="handleLogout()" class="w-8 h-8 rounded-full bg-red-500/10 hover:bg-red-500/30 text-red-400 flex items-center justify-center transition border border-red-500/20" title="Đăng xuất khỏi hệ sinh thái">
                <i class="fa-solid fa-power-off text-xs"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 w-full relative z-10">
        <div id="loading" class="text-center py-20 hidden">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
            <p class="text-gray-400">Đang đồng bộ dữ liệu...</p>
        </div>

        <div id="empty-state" class="hidden text-center py-20">
            <i class="fa-solid fa-folder-open text-6xl text-gray-600 mb-4"></i>
            <h2 class="text-2xl font-bold text-gray-300">Không gian trống!</h2>
            <p class="text-gray-500 mt-2">Hệ thống đang chờ lệnh triển khai dự án từ Dashboard.</p>
        </div>

        <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12"></div>
    </main>

    <footer class="py-6 border-t border-white/5 bg-black/40 backdrop-blur-md relative z-10">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-sm">
            <p class="text-gray-400 mb-4 md:mb-0">Crafted with <i class="fa-solid fa-bolt text-yellow-500 mx-1"></i> by <span class="font-bold text-white tracking-wide">d4m-dev</span></p>
            <a href="/dashboard.html" class="group flex items-center space-x-2 bg-white/5 hover:bg-white/10 px-4 py-2 rounded-full transition-all border border-white/10">
                <i class="fa-solid fa-shield-halved text-lg text-gray-400 group-hover:text-blue-400 transition-colors"></i>
                <span class="font-medium text-gray-300 group-hover:text-white transition-colors">Admin Login</span>
            </a>
        </div>
    </footer>

    <script>
        // 🚀 Hàm hiển thị Toast Notifications
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icon = type === 'success' ? '<i class="fa-solid fa-circle-check text-green-400"></i>' : '<i class="fa-solid fa-circle-exclamation text-red-400"></i>';
            const border = type === 'success' ? 'border-green-500/30 bg-green-500/10' : 'border-red-500/30 bg-red-500/10';
            
            toast.className = `flex items-center gap-3 px-5 py-3.5 rounded-xl border ${border} backdrop-blur-md shadow-xl toast-enter min-w-[250px]`;
            toast.innerHTML = `${icon} <span class="text-white text-sm font-medium">${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 🚀 KIỂM TRA TRẠNG THÁI LOGIN VÀ GỌI DỮ LIỆU PROFILE
        async function checkLoginStatus() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('login') === 'success') {
                showToast('✅ Xác thực D4M ID thành công! Chào mừng trở lại.');
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const token = localStorage.getItem('d4m_sso_token');
            if (token) {
                // Đảo giao diện Header
                document.getElementById('btnHeaderAuth').classList.add('hidden');
                document.getElementById('userProfileWidget').classList.remove('hidden');

                // Bắn API kéo thông tin người dùng từ Backend về
                try {
                    const res = await fetch('/api/auth/profile/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        // Cập nhật Avatar và Tên từ Database
                        document.getElementById('headerAvatar').src = data.data.avatar_url;
                        document.getElementById('headerUsername').innerText = data.data.full_name || data.data.username;
                    } else {
                        // Nếu Token hết hạn hoặc sai, tự động đăng xuất
                        handleLogout(false);
                    }
                } catch (e) {
                    console.log("Không thể kết nối máy chủ để lấy Profile");
                }
            }
        }

        // 🚀 HÀM ĐIỀU HƯỚNG ĐĂNG NHẬP
        function redirectToAuth() {
            window.location.href = `/auth.html?redirect=${window.location.pathname}`;
        }

        // 🚀 HÀM XỬ LÝ ĐĂNG XUẤT (XÓA VÍ TOKEN)
        function handleLogout(showMsg = true) {
            localStorage.removeItem('d4m_sso_token');
            if(showMsg) {
                alert("Đã đăng xuất khỏi hệ sinh thái D4M.");
            }
            window.location.reload();
        }

        // ==========================================
        // DỮ LIỆU VÀ HÀM VẼ CÁC CARD DỰ ÁN (GIỮ NGUYÊN)
        // ==========================================
        const coreApps = [
            { name: "Glass Town", path: "glass-town", desc: "Game Nông Trại & Tương tác 2.5D", icon: "fa-gamepad", color: "#e94560" },
            { name: "Music Pro", path: "music-pro.html", desc: "Trình phát nhạc chuẩn Premium", icon: "fa-compact-disc", color: "#3b82f6" },
            { name: "Love Sync", path: "love-sync.html", desc: "Đồng bộ và ghép đôi tình yêu", icon: "fa-heart", color: "#ec4899" },
            { name: "Thần Số Học", path: "numerology.html", desc: "Phân tích vận mệnh và đường đời", icon: "fa-star-and-crescent", color: "#8b5cf6" },
            { name: "Documentation", path: "documentation.html", desc: "Tài liệu hệ thống cốt lõi", icon: "fa-book", color: "#10b981" },
            { name: "Audio Test", path: "vocal-remove.html", desc: "Công cụ kiểm thử chức năng tách âm", icon: "fa-headphones", color: "#f59e0b" },
            { name: "YouTube Downloader", path: "yt-downloader.html", desc: "Tải MP4/MP3 YouTube Pro", icon: "fa-youtube", color: "#ff0033" }
        ];

        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${hash % 360}, 60%, 25%)`;
        }

        async function loadProjects() {
            document.getElementById('loading').classList.remove('hidden');
            const grid = document.getElementById('project-grid');
            grid.innerHTML = '';

            coreApps.forEach(app => {
                const techBadge = `<span class="bg-purple-500/10 text-purple-400 border border-purple-500/20 px-2.5 py-1 rounded-md text-xs font-bold"><i class="fa-solid fa-microchip mr-1"></i>Core App</span>`;
                const coverHtml = `<div class="h-36 w-full rounded-t-2xl flex items-center justify-center" style="background: linear-gradient(135deg, ${app.color}, #0b0f19)"><i class="fa-solid ${app.icon} text-5xl text-white/20"></i></div>`;

                grid.innerHTML += `
                    <div class="glass-card rounded-2xl flex flex-col relative group">
                        ${coverHtml}
                        <div class="absolute top-4 left-4 bg-black/60 px-2.5 py-1 rounded-md backdrop-blur-md text-[10px] font-black uppercase tracking-wider text-purple-400 border border-purple-500/30">
                            <i class="fa-solid fa-star mr-1"></i> Hệ thống
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <div class="flex justify-between items-start mb-3">
                                <h3 class="text-xl font-bold text-white capitalize truncate pr-2">${app.name}</h3>
                                ${techBadge}
                            </div>
                            <p class="text-sm text-gray-400 flex-grow mb-5 line-clamp-2 leading-relaxed">${app.desc}</p>
                            <div class="flex justify-between items-center mt-auto pt-4 border-t border-white/5">
                                <span class="text-xs text-gray-500 font-mono bg-white/5 px-2 py-1 rounded">/${app.path}</span>
                                <a href="/${app.path}" target="_blank" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white text-sm font-bold py-2 px-5 rounded-xl shadow-lg transition-all active:scale-95">Mở <i class="fa-solid fa-arrow-right ml-1"></i></a>
                            </div>
                        </div>
                    </div>
                `;
            });

            try {
                const port = window.location.port ? `:${window.location.port}` : '';
                const apiUrl = `${window.location.protocol}//${window.location.hostname}${port}/api/projects/`;
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                document.getElementById('loading').classList.add('hidden');

                if (data.projects.length === 0 && coreApps.length === 0) {
                    document.getElementById('empty-state').classList.remove('hidden');
                    return;
                }

                data.projects.forEach(proj => {
                    let techBadge = proj.has_python ? `<span class="bg-green-500/10 text-green-400 border border-green-500/20 px-2.5 py-1 rounded-md text-xs font-bold flex items-center"><span class="w-2 h-2 rounded-full bg-green-500 animate-pulse mr-1.5"></span>Python/Flask</span>` : `<span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 px-2.5 py-1 rounded-md text-xs font-bold"><i class="fa-brands fa-html5 mr-1"></i>HTML5</span>`;
                    let coverHtml = proj.thumbnail ? `<div class="h-36 w-full bg-cover bg-center rounded-t-2xl" style="background-image: url('${proj.thumbnail}')"></div>` : `<div class="h-36 w-full rounded-t-2xl flex items-center justify-center" style="background: linear-gradient(135deg, ${stringToColor(proj.name)}, #0b0f19)"><i class="fa-solid fa-code text-5xl text-white/10"></i></div>`;
                    const cardClass = proj.is_frozen ? 'frozen-card pointer-events-none' : '';
                    const linkButton = proj.is_frozen ? `<button class="bg-gray-800 text-gray-400 text-sm font-bold py-2 px-4 rounded-xl cursor-not-allowed border border-gray-700">Đã Khóa</button>` : `<a href="/${proj.name}" target="_blank" class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white text-sm font-bold py-2 px-5 rounded-xl shadow-lg transition-all active:scale-95">Mở <i class="fa-solid fa-arrow-right ml-1"></i></a>`;

                    grid.innerHTML += `
                        <div class="glass-card rounded-2xl flex flex-col relative group ${cardClass}">
                            ${coverHtml}
                            <div class="p-6 flex flex-col flex-grow">
                                <div class="flex justify-between items-start mb-3">
                                    <h3 class="text-xl font-bold text-white capitalize truncate pr-2">${proj.name.replace(/-/g, ' ')}</h3>
                                    ${techBadge}
                                </div>
                                <p class="text-sm text-gray-400 flex-grow mb-5 line-clamp-2 leading-relaxed">${proj.description}</p>
                                <div class="flex justify-between items-center mt-auto pt-4 border-t border-white/5">
                                    <span class="text-xs text-gray-500 font-mono bg-white/5 px-2 py-1 rounded">${proj.size}</span>
                                    ${linkButton}
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (err) { 
                if(coreApps.length === 0) document.getElementById('loading').innerHTML = '<p class="text-red-400 font-bold"><i class="fa-solid fa-triangle-exclamation mr-2"></i>Mất kết nối máy chủ!</p>';
                else document.getElementById('loading').classList.add('hidden');
            }
        }

        // Kích hoạt chuỗi hành động khi tải trang
        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
            loadProjects();
        });
    </script>
</body>
</html>
