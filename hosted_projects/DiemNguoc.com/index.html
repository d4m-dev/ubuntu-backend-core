<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ứng Dụng Đếm Số</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>Ứng Dụng Đếm Số</h1>
      <p class="author">Built with ❤️ by d4m-dev</p>
      <section class="counter">0</section>

      <section class="buttons">
        <button id="decrement">Giảm</button>
        <button id="increment">Tăng</button>
        <button id="reset">Đặt Lại</button>
      </section>

      <section class="settings">
        <p>
          <label for="startCount">Số Bắt Đầu</label>
          <input type="number" id="startCount" min="0" value="0" />
        </p>
        <p>
          <label for="maxCount">Số Tối Đa</label>
          <input type="number" id="maxCount" min="0" value="0" />
        </p>
      </section>
    </div>
  </body>
</html>
