<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biểu Mẫu Nhiều Bước</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <form class="form-wizard">
      <p class="author">Built with ❤️ by d4m-dev</p>
      <!-- .completed -->
      <div class="completed" hidden>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
          />
        </svg>

        <h3>Đăng Ký Thành Công!</h3>
        <p>Tài khoản của bạn đã được tạo.</p>
      </div>
      <!-- /.completed -->

      <h1>Đăng Ký</h1>

      <!-- .progress-container -->
      <div class="progress-container">
        <div class="progress"></div>

        <ol>
          <li class="current">Cá Nhân</li>
          <li>Liên Hệ</li>
          <li>Tài Khoản</li>
          <li>Giới Thiệu</li>
        </ol>
      </div>
      <!-- /.progress-container -->

      <!-- .steps-container -->
      <div class="steps-container">
        <div class="step">
          <h3>Thông Tin Cá Nhân</h3>

          <div class="form-control">
            <label for="first-name">Tên</label>
            <input type="text" id="first-name" name="first-name" required />
          </div>
          <div class="form-control">
            <label for="last-name">Họ</label>
            <input type="text" id="last-name" name="last-name" required />
          </div>
        </div>
        <div class="step">
          <h3>Thông Tin Liên Hệ</h3>

          <div class="form-control">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="form-control">
            <label for="phone">Số Điện Thoại</label>
            <input type="tel" id="phone" name="phone" required />
          </div>
        </div>
        <div class="step">
          <h3>Thông Tin Tài Khoản</h3>

          <div class="form-control">
            <label for="username">Tên Đăng Nhập</label>
            <input type="text" id="username" name="username" required />
          </div>
          <div class="form-control">
            <label for="password">Mật Khẩu</label>
            <input type="password" id="password" name="password" required />
          </div>
          <div class="form-control">
            <label for="confirm-password">Xác Nhận Mật Khẩu</label>
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              required
            />
          </div>
        </div>
        <div class="step">
          <h3>Giới Thiệu</h3>

          <div class="form-control">
            <label for="bio">Tiểu Sử</label>
            <textarea name="bio" id="bio" rows="4" required></textarea>
          </div>
        </div>
      </div>
      <!-- /.steps-container -->

      <!-- .controls -->
      <div class="controls">
        <button type="button" class="prev-btn">Trước</button>
        <button type="button" class="next-btn">Tiếp</button>
        <button type="submit" class="submit-btn">Gửi</button>
      </div>
      <!-- /.controls -->
    </form>
  </body>
</html>
