<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Town - Vùng Đất Nông Trại</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b0f19; font-family: sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="text-white antialiased">

    <div id="sso-screen" class="fixed inset-0 bg-[#0b0f19] z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <i class="fa-solid fa-fingerprint text-5xl text-blue-500 animate-pulse mb-4"></i>
        <p class="text-gray-400 text-sm font-mono tracking-widest mt-2">ĐANG NẠP DỮ LIỆU ĐỊNH DANH...</p>
    </div>

    <div id="game-viewport" class="w-full h-full"></div>

    <div id="game-ui" class="absolute inset-0 pointer-events-none hidden">
        <div class="absolute top-4 left-4 right-4 flex justify-between items-center pointer-events-auto">
            <div class="glass-panel px-5 py-2 rounded-full flex items-center space-x-3 shadow-lg border-b-2 border-blue-500/50">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center shadow-inner">
                    <i class="fa-solid fa-user-astronaut text-white text-xs"></i>
                </div>
                <div>
                    <p class="text-[10px] text-blue-300 font-bold uppercase tracking-wider">Nông dân</p>
                    <p id="ui-username" class="text-sm font-black text-white tracking-wide">Đang nạp...</p>
                </div>
            </div>
            <a href="/" class="glass-panel p-3 rounded-full text-gray-400 hover:text-red-400 hover:bg-white/10 transition shadow-lg flex items-center justify-center">
                <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </a>
        </div>

        <div class="absolute bottom-4 left-4 glass-panel p-2 rounded-2xl flex items-center shadow-lg w-80 pointer-events-auto border-t-2 border-purple-500/30">
            <input type="text" id="game-chat-input" class="w-full bg-transparent text-white outline-none placeholder-gray-500 px-3 text-sm" placeholder="Trò chuyện với làng...">
            <button id="btn-send-chat" class="ml-2 text-white font-bold px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl hover:from-blue-500 hover:to-purple-500 transition text-xs shadow-md">Gửi</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
