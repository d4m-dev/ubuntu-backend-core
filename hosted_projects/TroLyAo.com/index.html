<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="src/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="src/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="src/favicon/favicon-16x16.png">
    <link rel="manifest" href="src/favicon/site.webmanifest">
    <meta name="theme-color" content="#2563eb">
    <title>Trợ Lý DeepSeek</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="new-chat-btn">
                <i class="fa-solid fa-plus"></i> Trò chuyện mới
            </div>
            <div class="history-list">
                <div class="history-item active">Hôm nay</div>
                <div class="history-item">Hôm qua</div>
                <div class="history-item">Các cuộc trò chuyện trước</div>
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fa-solid fa-user-circle"></i> Người dùng
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <div class="menu-toggle">
                    <button id="menu-btn" title="Menu">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                </div>
                <div class="logo">
                    <i class="fa-solid fa-moon"></i> DeepSeek
                </div>
                <div class="header-controls">
                    <select id="voice-select" title="Cài đặt giọng nói"></select>
                    <button id="clear-history" title="Xóa lịch sử"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>

            <!-- Mobile Menu -->
            <div class="mobile-menu" id="mobile-menu">
                <div class="mobile-menu-header">
                    <button id="close-menu-btn" title="Đóng menu">
                        <i class="fa-solid fa-times"></i>
                    </button>
                </div>
                <div class="mobile-menu-content">
                    <button id="delete-current-conversation-mobile" title="Xóa cuộc trò chuyện hiện tại"><i class="fa-solid fa-trash"></i> Xóa cuộc trò chuyện</button>
                    <button id="new-chat-mobile" title="Tạo cuộc trò chuyện mới"><i class="fa-solid fa-plus"></i> Trò chuyện mới</button>
                    <div class="mobile-history-list">
                        <div class="mobile-history-item today active">Hôm nay</div>
                        <div class="mobile-history-item yesterday">Hôm qua</div>
                        <div class="mobile-history-item all-conversations">Tất cả cuộc trò chuyện</div>
                    </div>
                    <button id="settings-mobile" title="Cài đặt"><i class="fa-solid fa-cog"></i> Cài đặt</button>
                    <div class="mobile-user-info">
                        <i class="fa-solid fa-user-circle"></i> Người dùng
                    </div>
                </div>
            </div>

            <!-- Chat Container -->
            <div id="chat-container">
                <!-- Tin nhắn sẽ được thêm vào đây qua JS -->
                <div id="status" class="chat-status"></div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="text-input" placeholder="Nhắn tin cho DeepSeek..." rows="1"></textarea>
                    <button id="mic-btn"><i class="fa-solid fa-microphone"></i></button>
                    <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
                <div class="input-hints">
                    <small>DeepSeek R1 • Chế độ an toàn</small>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="src/app.js"></script>
</body>
</html>
