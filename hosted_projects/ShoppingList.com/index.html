<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Sách Mua Sắm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>Danh Sách Mua Sắm</h1>
      <p class="author">Built with ❤️ by d4m-dev</p>
      <form class="shopping-form">
        <input type="text" id="item" placeholder="Nhập tên món hàng" />
        <button type="submit">&plus;</button>
      </form>

      <div class="shopping-notice">Không có món hàng nào.</div>

      <div class="shopping-filter">
        <button data-filter="all" class="active">Tất Cả</button>
        <button data-filter="incomplete">Chưa Hoàn Thành</button>
        <button data-filter="completed">Đã Hoàn Thành</button>
      </div>

      <ul class="shopping-list"></ul>

      <div class="shopping-action">
        <button data-clear="all">Xóa Tất Cả</button>
        <button data-clear="completed">Xóa Đã Hoàn Thành</button>
      </div>
    </div>
  </body>
</html>
