<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QLChiTieu.com - Quản Lý Chi Tiêu Cá Nhân</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
          --bg-primary: #0f0f0f;
          --bg-secondary: #1a1a1a;
          --bg-tertiary: #2a2a2a;
          --primary-color: #2962ff;
          --primary-light: #4a7bff;
          --success-color: #4caf50;
          --warning-color: #ff9800;
          --danger-color: #f44336;
          --text-primary: #ffffff;
          --text-secondary: #b3b3b3;
          --border-radius: 12px;
          --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
          --glass-bg: rgba(255, 255, 255, 0.05);
          --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* Reset and Base Styles */
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          background-color: var(--bg-primary);
          color: var(--text-primary);
          line-height: 1.6;
          overflow-x: hidden;
        }

        .app-container {
          max-width: 1200px;
          margin: 0 auto;
          padding: 20px;
        }

        /* Top Bar */
        .top-bar {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 20px 0;
          margin-bottom: 20px;
          flex-wrap: wrap;
          gap: 20px;
        }

        .balance-section h2 {
          font-size: 1rem;
          color: var(--text-secondary);
          margin-bottom: 5px;
        }

        .balance-amount {
          font-size: 2rem;
          font-weight: bold;
          color: var(--text-primary);
        }

        .btn-primary {
          background: var(--primary-color);
          color: white;
          border: none;
          padding: 12px 24px;
          border-radius: var(--border-radius);
          cursor: pointer;
          font-size: 1rem;
          font-weight: bold;
          transition: all 0.3s ease;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .btn-primary:hover {
          background: var(--primary-light);
          transform: translateY(-2px);
          box-shadow: 0 4px 12px rgba(41, 98, 255, 0.3);
        }

        .btn-secondary {
          background: var(--bg-tertiary);
          color: var(--text-primary);
          border: 1px solid var(--glass-border);
          padding: 8px 16px;
          border-radius: var(--border-radius);
          cursor: pointer;
          transition: all 0.3s ease;
        }

        .btn-secondary:hover {
          background: var(--bg-secondary);
        }

        /* Navigation Tabs */
        .navigation-tabs {
          display: flex;
          gap: 10px;
          margin-bottom: 20px;
          overflow-x: auto;
          padding-bottom: 10px;
        }

        .tab-btn {
          background: var(--bg-secondary);
          color: var(--text-secondary);
          border: none;
          padding: 10px 20px;
          border-radius: var(--border-radius);
          cursor: pointer;
          transition: all 0.3s ease;
          white-space: nowrap;
        }

        .tab-btn.active,
        .tab-btn:hover {
          background: var(--primary-color);
          color: white;
        }

        /* Main Content */
        .main-content {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 20px;
          margin-bottom: 20px;
        }

        @media (max-width: 768px) {
          .main-content {
            grid-template-columns: 1fr;
          }
        }

        /* Glass Card */
        .glass-card {
          background: var(--glass-bg);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          border: 1px solid var(--glass-border);
          border-radius: var(--border-radius);
          padding: 20px;
          box-shadow: var(--shadow);
          transition: all 0.3s ease;
        }

        .glass-card:hover {
          transform: translateY(-5px);
          box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .chart-section {
          height: fit-content;
        }

        .transactions-section {
          height: fit-content;
        }

        .section-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 20px;
          flex-wrap: wrap;
          gap: 15px;
        }

        .filters {
          display: flex;
          gap: 10px;
          flex-wrap: wrap;
        }

        #search-input,
        #category-filter {
          background: var(--bg-tertiary);
          color: var(--text-primary);
          border: 1px solid var(--glass-border);
          padding: 8px 12px;
          border-radius: var(--border-radius);
          outline: none;
        }

        #search-input:focus,
        #category-filter:focus {
          border-color: var(--primary-color);
        }

        /* Transactions List */
        .transactions-list {
          display: flex;
          flex-direction: column;
          gap: 10px;
        }

        .transaction-item {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 15px;
          background: var(--bg-tertiary);
          border-radius: var(--border-radius);
          transition: all 0.3s ease;
        }

        .transaction-item:hover {
          background: var(--bg-secondary);
          transform: translateX(5px);
        }

        .transaction-info {
          display: flex;
          flex-direction: column;
        }

        .transaction-amount {
          font-weight: bold;
          font-size: 1.1rem;
        }

        .transaction-amount.expense {
          color: var(--danger-color);
        }

        .transaction-amount.income {
          color: var(--success-color);
        }

        .transaction-details {
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .transaction-icon {
          width: 30px;
          height: 30px;
          display: flex;
          align-items: center;
          justify-content: center;
          border-radius: 50%;
          background: var(--bg-secondary);
          font-size: 0.9rem;
        }

        /* Budget Section */
        .budget-section {
          margin-bottom: 20px;
        }

        .budget-controls {
          display: flex;
          gap: 10px;
          margin-bottom: 15px;
          flex-wrap: wrap;
        }

        #budget-input {
          flex: 1;
          min-width: 200px;
          background: var(--bg-tertiary);
          color: var(--text-primary);
          border: 1px solid var(--glass-border);
          padding: 10px 15px;
          border-radius: var(--border-radius);
          outline: none;
        }

        .progress-bar {
          width: 100%;
          height: 10px;
          background: var(--bg-tertiary);
          border-radius: 5px;
          overflow: hidden;
          margin: 10px 0;
        }

        .progress-fill {
          height: 100%;
          background: var(--primary-color);
          border-radius: 5px;
          transition: width 0.3s ease;
        }

        /* Export Controls */
        .export-controls {
          display: flex;
          gap: 10px;
          margin-bottom: 20px;
          flex-wrap: wrap;
        }

        /* Currency Widget */
        .currency-widget {
          position: fixed;
          top: 20px;
          right: 20px;
          width: 200px;
          z-index: 1000;
        }

        .rate-item {
          display: flex;
          justify-content: space-between;
          margin: 5px 0;
          font-size: 0.9rem;
        }

        /* Modal */
        .modal-overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.7);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 1001;
          opacity: 0;
          visibility: hidden;
          transition: all 0.3s ease;
        }

        .modal-overlay.active {
          opacity: 1;
          visibility: visible;
        }

        .modal-content {
          background: var(--bg-secondary);
          border-radius: var(--border-radius);
          padding: 30px;
          width: 90%;
          max-width: 500px;
          box-shadow: var(--shadow);
          transform: translateY(-20px);
          transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
          transform: translateY(0);
        }

        .form-group {
          margin-bottom: 20px;
        }

        .form-group label {
          display: block;
          margin-bottom: 5px;
          color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
          width: 100%;
          padding: 10px 15px;
          background: var(--bg-tertiary);
          color: var(--text-primary);
          border: 1px solid var(--glass-border);
          border-radius: var(--border-radius);
          outline: none;
        }

        .form-group textarea {
          resize: vertical;
          min-height: 80px;
        }

        .form-actions {
          display: flex;
          justify-content: flex-end;
          gap: 10px;
          margin-top: 20px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
          .app-container {
            padding: 10px;
          }

          .top-bar {
            flex-direction: column;
            align-items: stretch;
          }

          .balance-section {
            text-align: center;
          }

          .balance-amount {
            font-size: 1.5rem;
          }

          .navigation-tabs {
            justify-content: center;
          }

          .section-header {
            flex-direction: column;
            align-items: stretch;
          }

          .filters {
            width: 100%;
          }

          .budget-controls {
            flex-direction: column;
          }

          #budget-input {
            min-width: auto;
          }

          .currency-widget {
            position: static;
            width: auto;
            margin-top: 20px;
          }

          .modal-content {
            margin: 20px;
            width: calc(100% - 40px);
          }
        }

        @media (max-width: 480px) {
          .export-controls {
            flex-direction: column;
          }

          .btn-primary {
            width: 100%;
            justify-content: center;
          }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="balance-section">
                <h2>Số dư hiện tại</h2>
                <p class="balance-amount" id="current-balance">₫0</p>
            </div>
            <button class="btn-primary" id="add-transaction-btn">
                <span>+</span> Thêm giao dịch
            </button>
        </header>

        <!-- Navigation Tabs -->
        <nav class="navigation-tabs">
            <button class="tab-btn active" data-view="today">Hôm nay</button>
            <button class="tab-btn" data-view="week">Tuần này</button>
            <button class="tab-btn" data-view="month">Tháng này</button>
            <button class="tab-btn" data-view="year">Năm nay</button>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Chart Section -->
            <section class="chart-section glass-card">
                <h3>Tỷ lệ chi tiêu theo danh mục</h3>
                <canvas id="expense-chart" width="400" height="400"></canvas>
            </section>

            <!-- Transaction History -->
            <section class="transactions-section glass-card">
                <div class="section-header">
                    <h3>Lịch sử giao dịch</h3>
                    <div class="filters">
                        <input type="text" id="search-input" placeholder="Tìm kiếm...">
                        <select id="category-filter">
                            <option value="">Tất cả danh mục</option>
                            <option value="food">Ăn uống</option>
                            <option value="transport">Di chuyển</option>
                            <option value="shopping">Mua sắm</option>
                            <option value="entertainment">Giải trí</option>
                            <option value="utilities">Tiện ích</option>
                            <option value="health">Sức khỏe</option>
                            <option value="education">Giáo dục</option>
                            <option value="other">Khác</option>
                        </select>
                    </div>
                </div>
                <div class="transactions-list" id="transactions-list">
                    <!-- Transactions will be populated here -->
                    <p>Chưa có giao dịch nào. Hãy thêm giao dịch đầu tiên!</p>
                </div>
            </section>
        </main>

        <!-- Budget Section -->
        <section class="budget-section glass-card">
            <h3>Hạn mức chi tiêu</h3>
            <div class="budget-controls">
                <input type="number" id="budget-input" placeholder="Nhập hạn mức (₫)" min="0">
                <button id="set-budget-btn">Đặt hạn mức</button>
            </div>
            <div class="budget-status">
                <div class="progress-bar">
                    <div class="progress-fill" id="budget-progress"></div>
                </div>
                <p id="budget-status-text">Chưa đặt hạn mức</p>
            </div>
        </section>

        <!-- Export Controls -->
        <div class="export-controls">
            <button id="export-csv-btn" class="btn-secondary">Xuất CSV</button>
            <button id="export-excel-btn" class="btn-secondary">Xuất Excel</button>
        </div>

        <!-- Currency Widget -->
        <div class="currency-widget glass-card">
            <h4>Tỷ giá ngoại tệ</h4>
            <div id="currency-rates">
                <div class="rate-item">USD: <span id="usd-rate">0.00</span></div>
                <div class="rate-item">EUR: <span id="eur-rate">0.00</span></div>
                <div class="rate-item">JPY: <span id="jpy-rate">0.00</span></div>
            </div>
        </div>

        <!-- Modal for Adding/Editing Transactions -->
        <div class="modal-overlay" id="transaction-modal">
            <div class="modal-content">
                <h3 id="modal-title">Thêm giao dịch mới</h3>
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="transaction-amount">Số tiền (₫)</label>
                        <input type="number" id="transaction-amount" required min="0">
                    </div>
                    <div class="form-group">
                        <label for="transaction-category">Danh mục</label>
                        <select id="transaction-category" required>
                            <option value="food">Ăn uống</option>
                            <option value="transport">Di chuyển</option>
                            <option value="shopping">Mua sắm</option>
                            <option value="entertainment">Giải trí</option>
                            <option value="utilities">Tiện ích</option>
                            <option value="health">Sức khỏe</option>
                            <option value="education">Giáo dục</option>
                            <option value="other">Khác</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="transaction-date">Ngày</label>
                        <input type="date" id="transaction-date" required>
                    </div>
                    <div class="form-group">
                        <label for="transaction-note">Ghi chú</label>
                        <textarea id="transaction-note" placeholder="Ghi chú về giao dịch..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="cancel-btn">Hủy</button>
                        <button type="submit" id="save-btn">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Expense Tracker Application
        class ExpenseTracker {
          constructor() {
            // Initialize properties
            this.transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            this.currentView = 'today';
            this.budget = parseFloat(localStorage.getItem('monthlyBudget')) || 0;
            
            // DOM elements
            this.elements = {
              balance: document.getElementById('current-balance'),
              transactionsList: document.getElementById('transactions-list'),
              addTransactionBtn: document.getElementById('add-transaction-btn'),
              modal: document.getElementById('transaction-modal'),
              transactionForm: document.getElementById('transaction-form'),
              searchInput: document.getElementById('search-input'),
              categoryFilter: document.getElementById('category-filter'),
              budgetInput: document.getElementById('budget-input'),
              setBudgetBtn: document.getElementById('set-budget-btn'),
              budgetProgress: document.getElementById('budget-progress'),
              budgetStatusText: document.getElementById('budget-status-text'),
              exportCsvBtn: document.getElementById('export-csv-btn'),
              exportExcelBtn: document.getElementById('export-excel-btn'),
              cancelBtn: document.getElementById('cancel-btn'),
              saveBtn: document.getElementById('save-btn'),
              tabs: document.querySelectorAll('.tab-btn')
            };

            // Category icons mapping
            this.categoryIcons = {
              food: '🍽️',
              transport: '🚗',
              shopping: '🛍️',
              entertainment: '🎬',
              utilities: '💡',
              health: '🏥',
              education: '📚',
              other: '📦'
            };

            // Initialize the application
            this.init();
          }

          init() {
            // Set today's date as default for new transactions
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('transaction-date').value = today;

            // Bind event listeners
            this.bindEvents();

            // Render initial view
            this.render();
            
            // Update currency rates
            this.updateCurrencyRates();
          }

          bindEvents() {
            // Add transaction button
            this.elements.addTransactionBtn.addEventListener('click', () => {
              this.openModal();
            });

            // Form submission
            this.elements.transactionForm.addEventListener('submit', (e) => {
              e.preventDefault();
              this.saveTransaction();
            });

            // Cancel button
            this.elements.cancelBtn.addEventListener('click', () => {
              this.closeModal();
            });

            // Search and filter
            this.elements.searchInput.addEventListener('input', () => {
              this.renderTransactions();
            });

            this.elements.categoryFilter.addEventListener('change', () => {
              this.renderTransactions();
            });

            // Budget controls
            this.elements.setBudgetBtn.addEventListener('click', () => {
              this.setMonthlyBudget();
            });

            // Export buttons
            this.elements.exportCsvBtn.addEventListener('click', () => {
              this.exportToCSV();
            });

            this.elements.exportExcelBtn.addEventListener('click', () => {
              this.exportToExcel();
            });

            // Tab navigation
            this.elements.tabs.forEach(tab => {
              tab.addEventListener('click', () => {
                this.switchView(tab.dataset.view);
              });
            });

            // Close modal when clicking outside
            this.elements.modal.addEventListener('click', (e) => {
              if (e.target === this.elements.modal) {
                this.closeModal();
              }
            });
          }

          switchView(view) {
            this.currentView = view;
            
            // Update active tab
            this.elements.tabs.forEach(tab => {
              tab.classList.remove('active');
              if (tab.dataset.view === view) {
                tab.classList.add('active');
              }
            });
            
            this.render();
          }

          openModal(transaction = null) {
            const modalTitle = document.getElementById('modal-title');
            const amountInput = document.getElementById('transaction-amount');
            const categorySelect = document.getElementById('transaction-category');
            const dateInput = document.getElementById('transaction-date');
            const noteTextarea = document.getElementById('transaction-note');

            if (transaction) {
              // Editing existing transaction
              modalTitle.textContent = 'Sửa giao dịch';
              amountInput.value = transaction.amount;
              categorySelect.value = transaction.category;
              dateInput.value = transaction.date;
              noteTextarea.value = transaction.note || '';
              
              // Store transaction ID for update
              this.editingTransactionId = transaction.id;
            } else {
              // Adding new transaction
              modalTitle.textContent = 'Thêm giao dịch mới';
              this.elements.transactionForm.reset();
              dateInput.value = new Date().toISOString().split('T')[0];
              this.editingTransactionId = null;
            }

            this.elements.modal.classList.add('active');
          }

          closeModal() {
            this.elements.modal.classList.remove('active');
            this.editingTransactionId = null;
          }

          saveTransaction() {
            const amount = parseFloat(document.getElementById('transaction-amount').value);
            const category = document.getElementById('transaction-category').value;
            const date = document.getElementById('transaction-date').value;
            const note = document.getElementById('transaction-note').value.trim();

            if (!amount || !category || !date) {
              alert('Vui lòng điền đầy đủ thông tin!');
              return;
            }

            if (this.editingTransactionId) {
              // Update existing transaction
              const index = this.transactions.findIndex(t => t.id === this.editingTransactionId);
              if (index !== -1) {
                this.transactions[index] = {
                  ...this.transactions[index],
                  amount,
                  category,
                  date,
                  note
                };
              }
            } else {
              // Add new transaction
              const newTransaction = {
                id: Date.now(),
                amount,
                category,
                date,
                note,
                type: amount >= 0 ? 'income' : 'expense'
              };
              this.transactions.push(newTransaction);
            }

            // Save to localStorage
            this.saveToStorage();

            // Close modal and refresh UI
            this.closeModal();
            this.render();
          }

          deleteTransaction(id) {
            if (confirm('Bạn có chắc chắn muốn xóa giao dịch này?')) {
              this.transactions = this.transactions.filter(t => t.id !== id);
              this.saveToStorage();
              this.render();
            }
          }

          setMonthlyBudget() {
            const budgetValue = parseFloat(this.elements.budgetInput.value);
            if (isNaN(budgetValue) || budgetValue <= 0) {
              alert('Vui lòng nhập số tiền hợp lệ!');
              return;
            }

            this.budget = budgetValue;
            localStorage.setItem('monthlyBudget', this.budget);
            this.updateBudgetDisplay();
          }

          updateBudgetDisplay() {
            if (this.budget <= 0) {
              this.elements.budgetStatusText.textContent = 'Chưa đặt hạn mức';
              this.elements.budgetProgress.style.width = '0%';
              return;
            }

            const monthlyExpenses = this.getExpensesForCurrentMonth();
            const percentage = Math.min((monthlyExpenses / this.budget) * 100, 100);

            this.elements.budgetProgress.style.width = `${percentage}%`;
            
            if (percentage >= 90) {
              this.elements.budgetProgress.style.background = 'var(--danger-color)';
              this.elements.budgetStatusText.textContent = `Cảnh báo: Đã sử dụng ${percentage.toFixed(1)}% hạn mức`;
            } else if (percentage >= 70) {
              this.elements.budgetProgress.style.background = 'var(--warning-color)';
              this.elements.budgetStatusText.textContent = `Đã sử dụng ${percentage.toFixed(1)}% hạn mức`;
            } else {
              this.elements.budgetProgress.style.background = 'var(--primary-color)';
              this.elements.budgetStatusText.textContent = `Còn ${((this.budget - monthlyExpenses) / 1000).toFixed(1)}k để chi tiêu`;
            }
          }

          getExpensesForCurrentMonth() {
            const now = new Date();
            const month = now.getMonth();
            const year = now.getFullYear();

            return this.transactions
              .filter(t => {
                const transactionDate = new Date(t.date);
                return (
                  transactionDate.getMonth() === month &&
                  transactionDate.getFullYear() === year &&
                  t.type === 'expense'
                );
              })
              .reduce((sum, t) => sum + Math.abs(t.amount), 0);
          }

          render() {
            this.renderBalance();
            this.renderTransactions();
            this.renderChart();
            this.updateBudgetDisplay();
          }

          renderBalance() {
            const totalIncome = this.transactions
              .filter(t => t.type === 'income')
              .reduce((sum, t) => sum + t.amount, 0);

            const totalExpenses = this.transactions
              .filter(t => t.type === 'expense')
              .reduce((sum, t) => sum + Math.abs(t.amount), 0);

            const balance = totalIncome - totalExpenses;
            this.elements.balance.textContent = this.formatCurrency(balance);
          }

          renderTransactions() {
            // Get filtered transactions based on search and category filters
            let filteredTransactions = [...this.transactions];

            // Apply search filter
            const searchTerm = this.elements.searchInput.value.toLowerCase();
            if (searchTerm) {
              filteredTransactions = filteredTransactions.filter(t => 
                t.note.toLowerCase().includes(searchTerm) ||
                this.formatCurrency(Math.abs(t.amount)).includes(searchTerm)
              );
            }

            // Apply category filter
            const selectedCategory = this.elements.categoryFilter.value;
            if (selectedCategory) {
              filteredTransactions = filteredTransactions.filter(t => t.category === selectedCategory);
            }

            // Sort by date (newest first)
            filteredTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            // Filter by current view
            const now = new Date();
            switch (this.currentView) {
              case 'today':
                const today = now.toISOString().split('T')[0];
                filteredTransactions = filteredTransactions.filter(t => t.date === today);
                break;
              case 'week':
                const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                filteredTransactions = filteredTransactions.filter(t => new Date(t.date) >= oneWeekAgo);
                break;
              case 'month':
                const month = now.getMonth();
                const yearForMonth = now.getFullYear();
                filteredTransactions = filteredTransactions.filter(t => {
                  const transactionDate = new Date(t.date);
                  return transactionDate.getMonth() === month &&
                         transactionDate.getFullYear() === yearForMonth;
                });
                break;
              case 'year':
                const year = now.getFullYear();
                filteredTransactions = filteredTransactions.filter(t => {
                  const transactionDate = new Date(t.date);
                  return transactionDate.getFullYear() === year;
                });
                break;
            }

            // Render transactions
            this.elements.transactionsList.innerHTML = filteredTransactions.length > 0 
              ? filteredTransactions.map(transaction => {
                  const categoryIcon = this.categoryIcons[transaction.category] || '📦';
                  const formattedAmount = this.formatCurrency(Math.abs(transaction.amount));
                  const typeClass = transaction.type === 'income' ? 'income' : 'expense';

                  return `
                    <div class="transaction-item">
                      <div class="transaction-info">
                        <div class="transaction-details">
                          <div class="transaction-icon">${categoryIcon}</div>
                          <div>
                            <div>${transaction.note || 'Không có ghi chú'}</div>
                            <div class="transaction-date">${this.formatDate(transaction.date)}</div>
                          </div>
                        </div>
                      </div>
                      <div class="transaction-amount ${typeClass}">
                        ${transaction.type === 'income' ? '+' : '-'}${formattedAmount}
                      </div>
                      <div class="transaction-actions">
                        <button onclick="expenseTracker.openModal(${JSON.stringify(transaction).replace(/"/g, '&quot;')})" class="btn-secondary">Sửa</button>
                        <button onclick="expenseTracker.deleteTransaction(${transaction.id})" class="btn-secondary" style="background: var(--danger-color);">Xóa</button>
                      </div>
                    </div>
                  `;
                }).join('')
              : '<p>Không có giao dịch nào phù hợp</p>';
          }

          renderChart() {
            // Since we can't load Chart.js in this standalone version, 
            // we'll create a simple visual representation using HTML/CSS
            const canvas = document.getElementById('expense-chart');
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw a simple pie chart representation
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) - 10;
            
            // Sample data for demonstration
            const categories = ['Ăn uống', 'Di chuyển', 'Mua sắm', 'Giải trí'];
            const amounts = [40, 20, 25, 15]; // percentages
            const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0'];
            
            let startAngle = 0;
            
            for (let i = 0; i < categories.length; i++) {
              const sliceAngle = (amounts[i] / 100) * 2 * Math.PI;
              
              ctx.beginPath();
              ctx.moveTo(centerX, centerY);
              ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
              ctx.closePath();
              ctx.fillStyle = colors[i];
              ctx.fill();
              
              startAngle += sliceAngle;
            }
            
            // Draw center circle to make it look like a doughnut chart
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.5, 0, 2 * Math.PI);
            ctx.fillStyle = 'var(--bg-primary)';
            ctx.fill();
          }

          formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('vi-VN');
          }

          formatCurrency(amount) {
            return new Intl.NumberFormat('vi-VN', {
              style: 'currency',
              currency: 'VND'
            }).format(amount);
          }

          saveToStorage() {
            localStorage.setItem('transactions', JSON.stringify(this.transactions));
          }

          exportToCSV() {
            if (this.transactions.length === 0) {
              alert('Không có dữ liệu để xuất!');
              return;
            }

            // Create CSV content
            let csvContent = 'ID,Số tiền,Danh mục,Ngày,Ghi chú,Loại\n';
            
            this.transactions.forEach(transaction => {
              const row = [
                transaction.id,
                transaction.amount,
                this.getCategoryName(transaction.category),
                transaction.date,
                `"${transaction.note}"`,
                transaction.type
              ].join(',');
              
              csvContent += row + '\n';
            });

            // Create download link
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.setAttribute('href', url);
            link.setAttribute('download', `qlchitieu_${new Date().toISOString().slice(0, 10)}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          }

          exportToExcel() {
            alert('Tính năng xuất Excel sẽ được triển khai trong phiên bản nâng cao hơn.');
            // Note: For a full Excel export, we would need to use a library like SheetJS
            // For now, we'll just show an alert
          }

          getCategoryName(category) {
            const names = {
              food: 'Ăn uống',
              transport: 'Di chuyển',
              shopping: 'Mua sắm',
              entertainment: 'Giải trí',
              utilities: 'Tiện ích',
              health: 'Sức khỏe',
              education: 'Giáo dục',
              other: 'Khác'
            };
            return names[category] || category;
          }

          async updateCurrencyRates() {
            // In a real app, we would fetch from an API
            // For demo purposes, we'll use mock values
            document.getElementById('usd-rate').textContent = '23,500';
            document.getElementById('eur-rate').textContent = '26,500';
            document.getElementById('jpy-rate').textContent = '170';
            
            // Simulate API call delay
            await new Promise(resolve => setTimeout(resolve, 1000));
          }
        }

        // Initialize the application when the DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
          window.expenseTracker = new ExpenseTracker();
          
          // Add sample transaction for demonstration
          if (localStorage.getItem('transactions') === null) {
            const sampleTransactions = [
              {
                id: 1,
                amount: 150000,
                category: 'food',
                date: new Date().toISOString().split('T')[0],
                note: 'Ăn trưa với đồng nghiệp',
                type: 'expense'
              },
              {
                id: 2,
                amount: 50000,
                category: 'transport',
                date: new Date().toISOString().split('T')[0],
                note: 'Xe ôm công nghệ',
                type: 'expense'
              },
              {
                id: 3,
                amount: 5000000,
                category: 'income',
                date: new Date().toISOString().split('T')[0],
                note: 'Lương tháng này',
                type: 'income'
              }
            ];
            
            localStorage.setItem('transactions', JSON.stringify(sampleTransactions));
            window.expenseTracker.transactions = sampleTransactions;
            window.expenseTracker.render();
          }
        });
    </script>
