<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Live Terminal Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- Reset & Base Terminal Theme --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0c0c0f; 
            color: #d4d4d8; 
            font-family: 'Fira Code', monospace; 
            padding: 15px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* --- Header của Terminal --- */
        .terminal-header { 
            background-color: #18181b; 
            border: 1px solid #27272a; 
            padding: 12px 15px; 
            border-radius: 6px 6px 0 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-shrink: 0; 
        }
        .terminal-title { 
            font-size: 13px; 
            font-weight: 500; 
            color: #a1a1aa; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        
        /* Đèn hiệu ứng Trạng thái Kết nối */
        .status-dot { 
            width: 8px; 
            height: 8px; 
            background-color: #22c55e; 
            border-radius: 50%; 
            box-shadow: 0 0 10px #22c55e; 
            transition: all 0.3s;
        }
        .status-dot.disconnected { 
            background-color: #ef4444; 
            box-shadow: 0 0 10px #ef4444; 
        }
        
        .controls button { 
            background-color: #27272a; 
            border: 1px solid #3f3f46; 
            color: #e4e4e7; 
            padding: 5px 12px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 12px; 
            font-family: inherit; 
            transition: 0.2s;
        }
        .controls button:hover { background-color: #3f3f46; color: #fff; }
        
        /* --- Thân Terminal hiển thị Log --- */
        .terminal-body { 
            flex: 1; 
            background-color: #050507; 
            border: 1px solid #27272a; 
            border-top: none; 
            border-radius: 0 0 6px 6px; 
            padding: 15px; 
            overflow-y: auto; 
            font-size: 13px; 
            line-height: 1.6; 
            white-space: pre-wrap; 
            word-break: break-all; 
        }
        
        /* --- Các lớp màu sắc phân chia cấu trúc Log --- */
        .log-line { margin-bottom: 6px; display: block; animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Thành phần Request chuẩn */
        .ip { color: #38bdf8; }          /* IP: Xanh lam nhạt */
        .timestamp { color: #71717a; }   /* Thời gian: Xám */
        .method { color: #fbbf24; font-weight: bold; } /* OPTIONS/GET/POST: Vàng */
        .path { color: #f4f4f5; }        /* Đường dẫn URL: Trắng đục */
        
        /* Phân loại mã trạng thái HTTP (Status Code) */
        .status-2xx { color: #4ade80; font-weight: bold; } /* Thành công: Xanh lá */
        .status-3xx { color: #60a5fa; font-weight: bold; } /* Chuyển hướng: Xanh dương */
        .status-4xx { color: #f87171; font-weight: bold; } /* Lỗi Client: Đỏ cam */
        .status-5xx { color: #f43f5e; font-weight: bold; background-color: rgba(244,63,94,0.15); padding: 1px 4px; border-radius: 3px; } /* Lỗi Server: Đỏ sẫm */

        /* Log nội bộ tùy biến */
        .tag-user { color: #c084fc; font-weight: bold; }  /* Khung nhận tin: Tím */
        .tag-sys { color: #22d3ee; font-weight: bold; }   /* Hệ thống: Xanh ngọc */
        .tag-error { color: #fb7185; font-weight: bold; } /* Tiến trình lỗi: Hồng đỏ */
    </style>
</head>
<body>

    <div class="terminal-header">
        <div class="terminal-title">
            <div class="status-dot" id="statusDot"></div>
            <span>AI Backend Live Stream Terminal [Port 25152]</span>
        </div>
        <div class="controls">
            <button id="clearBtn">Clear Logs</button>
        </div>
    </div>
    
    <div class="terminal-body" id="terminalBody"></div>

    <script>
        const terminalBody = document.getElementById('terminalBody');
        const statusDot = document.getElementById('statusDot');
        const clearBtn = document.getElementById('clearBtn');

        // Kết nối luồng dữ liệu thời gian thực (SSE) từ Python Server
        const eventSource = new EventSource(`http://${window.location.hostname}:25152/api/logs`);

        eventSource.onopen = () => {
            statusDot.classList.remove('disconnected');
            printSystemMessage('Kết nối thành công đến luồng dữ liệu Server.');
        };

        eventSource.onerror = () => {
            statusDot.classList.add('disconnected');
            printErrorMessage('Mất kết nối tới máy chủ. Đang tự động thử lại...');
        };

        eventSource.onmessage = (event) => {
            const rawLog = event.data;
            if (rawLog && rawLog.trim() !== '') {
                appendFormattedLog(rawLog);
            }
        };

        // Nút xóa sạch màn hình log
        clearBtn.addEventListener('click', () => {
            terminalBody.innerHTML = '';
        });

        function printSystemMessage(msg) {
            const span = document.createElement('span');
            span.className = 'log-line';
            span.innerHTML = `<span class="tag-sys">[Hệ thống]:</span> ${msg}`;
            terminalBody.appendChild(span);
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        function printErrorMessage(msg) {
            const span = document.createElement('span');
            span.className = 'log-line';
            span.innerHTML = `<span class="tag-error">[Lỗi]:</span> ${msg}`;
            terminalBody.appendChild(span);
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        function appendFormattedLog(text) {
            const span = document.createElement('span');
            span.className = 'log-line';

            // Biểu thức chính quy (Regex) để bóc tách cấu trúc log mặc định của Flask/Werkzeug
            // Mẫu log: 192.168.110.229 - - [26/May/2026 02:29:14] "OPTIONS /api/chat HTTP/1.1" 200 -
            const flaskRegex = /^([\d\.]+) - - \[(.*?)\] "(GET|POST|OPTIONS|PUT|DELETE) (.*?) HTTP\/.*?" (\d{3}) -/;
            const isFlaskLog = text.match(flaskRegex);

            if (isFlaskLog) {
                const [_, ip, timestamp, method, path, status] = isFlaskLog;
                
                // Xác định class màu dựa trên đầu số của mã trạng thái HTTP (Status Code)
                let statusClass = 'status-2xx';
                if (status.startsWith('3')) statusClass = 'status-3xx';
                if (status.startsWith('4')) statusClass = 'status-4xx';
                if (status.startsWith('5')) statusClass = 'status-5xx';

                span.innerHTML = `<span class="ip">${ip}</span> - - [<span class="timestamp">${timestamp}</span>] "<span class="method">${method}</span> <span class="path">${path}</span> HTTP/1.1" <span class="${statusClass}">${status}</span> -`;
            } 
            // Phân tách màu sắc cho các chuỗi Log ứng dụng nội bộ
            else if (text.includes('[Nhận tin nhắn]:')) {
                const cleanText = text.replace('[Nhận tin nhắn]:', '');
                span.innerHTML = `<span class="tag-user">[Nhận tin nhắn]:</span>${escapeHtml(cleanText)}`;
            } else if (text.includes('[Hệ thống]:')) {
                const cleanText = text.replace('[Hệ thống]:', '');
                span.innerHTML = `<span class="tag-sys">[Hệ thống]:</span>${escapeHtml(cleanText)}`;
            } else if (text.includes('[Lỗi]:') || text.includes('[Lỗi Server]:')) {
                const cleanText = text.replace(/\[Lỗi.*?\]:/, '');
                span.innerHTML = `<span class="tag-error">[Lỗi]:</span>${escapeHtml(cleanText)}`;
            } else {
                // Log thông thường không khớp mẫu cấu trúc
                span.textContent = text;
            }

            terminalBody.appendChild(span);
            
            // Tự động cuộn màn hình terminal xuống dòng log mới nhất
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        // Hàm khử mã độc XSS bảo vệ giao diện terminal log
        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, function (s) {
                return {
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                }[s];
            });
        }
    </script>
</body>
</html>
