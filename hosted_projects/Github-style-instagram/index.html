<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>d4m-dev • Instagram Portfolio</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CORE DESIGN TOKENS --- */
        :root {
            --primary-bg: #ffffff;
            --secondary-bg: #fafafa;
            --text-main: #262626;
            --text-secondary: #737373;
            --border-color: #dbdbdb;
            --btn-gray: #efefef;
            --btn-gray-hover: #dbdbdb;
            --ig-blue: #0095f6;
            --ig-blue-hover: #1877f2;
            --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --ai-glow: 0 0 15px rgba(162, 28, 175, 0.3);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- HEADER REFINED --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            display: flex;
            justify-content: center;
        }

        .header-inner {
            width: 100%;
            max-width: 975px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Times New Roman', serif;
            font-size: 26px;
            font-weight: bold;
            font-style: italic;
            background: var(--ig-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            position: relative;
            width: 268px;
        }

        .search-container input {
            width: 100%;
            height: 36px;
            background: var(--btn-gray);
            border: none;
            border-radius: 8px;
            padding: 0 12px 0 35px;
            font-size: 14px;
            outline: none;
        }

        .search-container i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
        }

        .nav-icons {
            display: flex;
            gap: 24px;
            font-size: 22px;
            align-items: center;
        }

        .nav-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .nav-avatar:hover { transform: scale(1.1); }

        /* --- MAIN CONTENT REFINED --- */
        main {
            max-width: 935px;
            margin: 60px auto 0;
            padding: 40px 20px;
        }

        /* Profile Header */
        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 50px;
            gap: 50px;
        }

        .avatar-section {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .avatar-ring {
            width: 160px;
            height: 160px;
            background: var(--ig-gradient);
            border-radius: 50%;
            padding: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .avatar-ring:hover { transform: rotate(15deg); }

        .avatar-inner {
            background: white;
            padding: 2px;
            border-radius: 50%;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .info-top {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .username {
            font-size: 24px;
            font-weight: 300;
            margin-right: 10px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn {
            height: 32px;
            padding: 0 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .btn-blue {
            background-color: var(--ig-blue);
            color: white;
        }

        .btn-blue:hover { background-color: var(--ig-blue-hover); }

        .btn-light {
            background-color: var(--btn-gray);
            color: var(--text-main);
        }

        .btn-light:hover { background-color: var(--btn-gray-hover); }

        .btn-ai-sparkle {
            background: #fdf4ff;
            color: #a21caf;
            border: 1px solid #f5d0fe;
            box-shadow: var(--ai-glow);
        }

        .info-stats {
            display: flex;
            gap: 40px;
            font-size: 16px;
        }

        .info-stats b { font-weight: 600; color: var(--text-main); }
        .info-stats span { color: var(--text-main); }

        .info-bio h1 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .info-bio p { font-size: 14px; color: var(--text-main); line-height: 1.4; }
        .info-bio a { color: var(--ig-link); font-weight: 600; font-size: 14px; text-decoration: none; display: inline-block; margin-top: 5px; }

        /* Highlights */
        .highlights-strip {
            display: flex;
            gap: 30px;
            margin-bottom: 50px;
            overflow-x: auto;
            padding: 5px 0;
            scrollbar-width: none;
        }

        .highlights-strip::-webkit-scrollbar { display: none; }

        .highlight-circle-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
        }

        .highlight-circle-wrapper:hover { transform: translateY(-3px); }

        .h-circle {
            width: 77px;
            height: 77px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--secondary-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            transition: var(--transition);
        }

        .h-circle.special {
            background: #fdf4ff;
            border: 1px solid #f5d0fe;
            color: #a21caf;
        }

        .highlight-circle-wrapper span { font-size: 12px; font-weight: 500; color: var(--text-main); }

        /* Tabs Refined */
        .content-tabs {
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            gap: 60px;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 18px 0;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .tab.active {
            color: var(--text-main);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            width: 100%;
            height: 1.5px;
            background: var(--text-main);
        }

        /* Post Grid Modernized */
        .post-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            margin-top: 10px;
        }

        .post-item {
            aspect-ratio: 1/1;
            background: var(--secondary-bg);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.03);
            transition: var(--transition);
        }

        .post-item i { font-size: 45px; color: #e2e2e2; transition: var(--transition); }
        .post-item:hover i { transform: scale(1.1); color: #ccc; }

        .post-label {
            margin-top: 12px;
            text-align: center;
            padding: 0 15px;
        }

        .post-label .p-name { font-size: 13px; font-weight: 600; display: block; color: var(--text-main); }
        .post-label .p-lang { font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-top: 4px; display: block; }

        .post-hover {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            opacity: 0;
            transition: var(--transition);
            backdrop-filter: blur(2px);
        }

        .post-item:hover .post-hover { opacity: 1; }

        /* --- MODAL REIMAGINED --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-box {
            background: white;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            display: flex;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-main {
            flex: 1.6;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 60px;
        }

        .modal-sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-left: 1px solid var(--border-color);
        }

        .modal-header {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--btn-gray);
        }

        .header-user { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 14px; }
        .header-user img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }

        .modal-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.6;
        }

        .ai-card {
            background: linear-gradient(to bottom right, #fdf4ff, #fae8ff);
            border: 1px solid #f5d0fe;
            border-radius: 12px;
            padding: 16px;
            margin-top: 25px;
            display: none;
            position: relative;
        }

        .ai-card::before {
            content: '✨ GEMINI AI';
            position: absolute;
            top: -10px;
            left: 15px;
            background: #a21caf;
            color: white;
            font-size: 9px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .modal-footer {
            padding: 16px;
            border-top: 1px solid var(--btn-gray);
        }

        .footer-actions {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .action-left { display: flex; gap: 18px; }
        .action-left i { cursor: pointer; transition: var(--transition); }
        .action-left i:hover { color: var(--text-secondary); }

        .btn-full-ai {
            width: 100%;
            background: var(--ig-gradient);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Loading Animation */
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 768px) {
            .profile-header { gap: 20px; margin-bottom: 30px; }
            .avatar-ring { width: 85px; height: 85px; }
            .info-stats { display: none; }
            .post-grid { gap: 3px; }
            .modal-box { flex-direction: column; height: 95vh; }
            .modal-main { min-height: 200px; padding: 30px; }
            .search-container { display: none; }
            .desktop-only { display: none; }
            .username { font-size: 20px; }
            .info-section { gap: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="logo">Instagram</div>
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Tìm kiếm tài năng...">
            </div>
            <div class="nav-icons">
                <i class="fa-solid fa-house desktop-only"></i>
                <i class="fa-solid fa-wand-magic-sparkles" style="color: #a21caf; cursor: pointer;" id="nav-ai-btn"></i>
                <i class="fa-regular fa-paper-plane"></i>
                <i class="fa-regular fa-compass desktop-only"></i>
                <i class="fa-regular fa-heart"></i>
                <img id="nav-avatar-img" src="" class="nav-avatar" alt="User">
            </div>
        </div>
    </header>

    <main>
        <!-- Profile -->
        <section class="profile-header">
            <div class="avatar-section">
                <div class="avatar-ring">
                    <div class="avatar-inner">
                        <img id="main-avatar-img" src="" alt="Avatar">
                    </div>
                </div>
            </div>
            <div class="info-section">
                <div class="info-top">
                    <h2 class="username" id="user-handle">d4m-dev</h2>
                    <div class="btn-group">
                        <button class="btn btn-blue">Theo dõi</button>
                        <button class="btn btn-light">Nhắn tin</button>
                        <button class="btn btn-light btn-ai-sparkle" id="bio-magic-btn">✨</button>
                    </div>
                </div>
                <div class="info-stats">
                    <div><b>0</b> bài viết</div>
                    <div><b>0</b> người theo dõi</div>
                    <div><b>0</b> đang theo dõi</div>
                </div>
                <div class="info-bio">
                    <h1 id="user-fullname">Họ tên đang tải...</h1>
                    <p id="user-bio">Mô tả bản thân...</p>
                    <a id="user-website" href="#" target="_blank">github.com/d4m-dev</a>
                </div>
            </div>
        </section>

        <!-- Highlights -->
        <section class="highlights-strip">
            <div class="highlight-circle-wrapper" id="story-ai-career">
                <div class="h-circle special">✨</div>
                <span>Tư vấn AI</span>
            </div>
            <div id="dynamic-highlights" style="display: flex; gap: 30px;"></div>
        </section>

        <!-- Tabs -->
        <div class="content-tabs">
            <div class="tab active">
                <i class="fa-solid fa-table-cells"></i> Bài viết
            </div>
            <div class="tab">
                <i class="fa-solid fa-play"></i> Reels
            </div>
            <div class="tab">
                <i class="fa-regular fa-id-card"></i> Đã gắn thẻ
            </div>
        </div>

        <!-- Grid -->
        <section class="post-grid" id="main-post-grid"></section>
    </main>

    <!-- Modal Project -->
    <div class="modal-overlay" id="project-modal">
        <div class="modal-box">
            <div class="modal-main">
                <i class="fa-brands fa-github" style="font-size: 100px; opacity: 0.15;"></i>
                <h3 id="modal-repo-name" style="margin-top: 30px; font-size: 32px; letter-spacing: -1px; text-transform: uppercase;">REPO NAME</h3>
                <span id="modal-repo-tag" style="font-family: monospace; color: #888; font-size: 14px; margin-top: 10px;">JAVASCRIPT</span>
            </div>
            <div class="modal-sidebar">
                <div class="modal-header">
                    <div class="header-user">
                        <img id="modal-user-avatar" src="" alt="Avatar">
                        <span>d4m-dev</span>
                        <span style="color: var(--ig-blue); font-weight: 700; font-size: 12px; margin-left: 5px; cursor: pointer;">• Theo dõi</span>
                    </div>
                    <i class="fa-solid fa-ellipsis" style="cursor: pointer;"></i>
                </div>
                <div class="modal-body">
                    <p id="modal-repo-description" style="color: #262626;"></p>
                    <div class="ai-card" id="ai-insight-card">
                        <div id="ai-insight-text" style="color: #701a75; font-size: 14px; line-height: 1.5;"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <div class="footer-actions">
                        <div class="action-left">
                            <i class="fa-regular fa-heart"></i>
                            <i class="fa-regular fa-comment"></i>
                            <i class="fa-regular fa-paper-plane"></i>
                        </div>
                        <i class="fa-regular fa-bookmark"></i>
                    </div>
                    <p style="font-weight: 700; font-size: 14px; margin-bottom: 12px;"><span id="modal-likes-count">0</span> lượt thích</p>
                    <button class="btn-full-ai" id="btn-analyze-repo">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> PHÂN TÍCH BẰNG GEMINI AI
                    </button>
                    <a id="modal-repo-url" href="#" target="_blank" style="display:block; text-align:center; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 13px; font-weight: 700; text-decoration: none; color: inherit; transition: var(--transition);">MỞ TRÊN GITHUB</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // API Key auto-provided
        const githubUser = "d4m-dev";
        let userRepoData = [];
        let activeRepo = null;

        // --- GEMINI AI INTEGRATION ---
        async function runAI(prompt) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "Bạn là một trợ lý AI sáng tạo dành cho Portfolio. Hãy trả lời bằng tiếng Việt, ngắn gọn, súc tích và sử dụng các emoji phù hợp." }] }
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                return "AI đang bận một chút, hãy thử lại sau nhé! 🛠️";
            }
        }

        // --- GITHUB API DATA FETCHING ---
        async function initPortfolio() {
            try {
                // Fetch Profile
                const userRes = await fetch(`https://api.github.com/users/${githubUser}`);
                const profile = await userRes.json();
                
                // Update UI
                const avatarElements = ['nav-avatar-img', 'main-avatar-img', 'modal-user-avatar'];
                avatarElements.forEach(id => document.getElementById(id).src = profile.avatar_url);
                
                document.getElementById('user-handle').innerText = profile.login;
                document.getElementById('user-fullname').innerText = profile.name || profile.login;
                document.getElementById('user-bio').innerText = profile.bio || "🚀 Đam mê lập trình và xây dựng các sản phẩm tuyệt vời.";
                
                const stats = document.querySelectorAll('.info-stats b');
                stats[0].innerText = profile.public_repos;
                stats[1].innerText = profile.followers;
                stats[2].innerText = profile.following;

                // Fetch Repos
                const repoRes = await fetch(`https://api.github.com/users/${githubUser}/repos?sort=updated&per_page=12`);
                userRepoData = await repoRes.json();
                
                renderPosts();
                renderHighlights();
            } catch (err) {
                console.error("Lỗi khi tải dữ liệu:", err);
            }
        }

        function renderPosts() {
            const grid = document.getElementById('main-post-grid');
            grid.innerHTML = userRepoData.map(repo => `
                <div class="post-item" onclick="showProject('${repo.id}')">
                    <i class="fa-brands fa-github"></i>
                    <div class="post-label">
                        <span class="p-name">${repo.name}</span>
                        <span class="p-lang">${repo.language || 'Documentation'}</span>
                    </div>
                    <div class="post-hover">
                        <span><i class="fa-solid fa-heart" style="font-size: 18px"></i> ${repo.stargazers_count}</span>
                        <span><i class="fa-solid fa-code-fork" style="font-size: 18px"></i> ${repo.forks_count}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderHighlights() {
            const techStack = [...new Set(userRepoData.map(r => r.language).filter(l => l))].slice(0, 5);
            const container = document.getElementById('dynamic-highlights');
            container.innerHTML = techStack.map(lang => `
                <div class="highlight-circle-wrapper">
                    <div class="h-circle">${lang.charAt(0)}</div>
                    <span>${lang}</span>
                </div>
            `).join('');
        }

        // --- MODAL & UI ACTIONS ---
        function showProject(id) {
            activeRepo = userRepoData.find(r => r.id == id);
            document.getElementById('modal-repo-name').innerText = activeRepo.name;
            document.getElementById('modal-repo-tag').innerText = activeRepo.language || 'General';
            document.getElementById('modal-repo-description').innerText = activeRepo.description || "Dự án này rất đặc biệt nhưng dường như tác giả chưa kịp viết mô tả trên GitHub! 😅";
            document.getElementById('modal-likes-count').innerText = activeRepo.stargazers_count;
            document.getElementById('modal-repo-url').href = activeRepo.html_url;
            
            document.getElementById('ai-insight-card').style.display = 'none';
            document.getElementById('project-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeProject() {
            document.getElementById('project-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('project-modal').onclick = (e) => {
            if (e.target.id === 'project-modal') closeProject();
        };

        // --- AI ACTION TRIGGERS ---
        document.getElementById('nav-ai-btn').onclick = async () => {
            const res = await runAI("Hãy đưa ra một lời chào nồng nhiệt và ngắn gọn cho khách truy cập Portfolio của một lập trình viên.");
            alert("✨ Gemini AI: " + res);
        };

        document.getElementById('bio-magic-btn').onclick = async () => {
            const currentBio = document.getElementById('user-bio').innerText;
            const res = await runAI(`Dựa trên bio này: "${currentBio}", hãy viết lại nó thật ấn tượng, phong cách kỹ sư phần mềm chuyên nghiệp.`);
            document.getElementById('user-bio').innerText = res;
        };

        document.getElementById('story-ai-career').onclick = async () => {
            const tech = [...new Set(userRepoData.map(r => r.language).filter(l => l))].join(", ");
            const res = await runAI(`Dựa trên các ngôn ngữ tôi sử dụng (${tech}), hãy đưa ra một lời khuyên về xu hướng công nghệ tiếp theo tôi nên học.`);
            alert("💡 Lời khuyên sự nghiệp từ AI: " + res);
        };

        document.getElementById('btn-analyze-repo').onclick = async () => {
            const card = document.getElementById('ai-insight-card');
            const text = document.getElementById('ai-insight-text');
            const btn = document.getElementById('btn-analyze-repo');
            
            btn.innerHTML = '<div class="loader"></div> ĐANG PHÂN TÍCH...';
            btn.disabled = true;

            const res = await runAI(`Phân tích dự án GitHub mang tên "${activeRepo.name}" viết bằng ngôn ngữ ${activeRepo.language}. Cho biết lợi ích của dự án này.`);
            
            text.innerText = res;
            card.style.display = 'block';
            btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> PHÂN TÍCH BẰNG GEMINI AI';
            btn.disabled = false;
        };

        // Initial Load
        initPortfolio();
    </script>
</body>
</html>
