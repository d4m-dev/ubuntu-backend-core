<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Sách Sắp Xếp</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
  </head>
  <body>
    <main>
      <h2>Kỹ Năng Hàng Đầu</h2>
      <p class="author">Built with ❤️ by d4m-dev</p>

      <ol class="skills"></ol>

    <button class="add-skill">+</button>

    <dialog class="skill-modal">

        <h3>Thêm Kỹ Năng</h3>
        <input type="text" id="skill" placeholder="Nhập kỹ năng" autofocus />
      </form>
    </dialog>
  </body>
